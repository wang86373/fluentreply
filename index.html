<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #f4f7fb, #eef3ff);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 16px;
}

.header {
  text-align: center;
  margin-bottom: 24px;
}

.logo {
  font-size: 36px;
  font-weight: 800;
}

.subtitle {
  color: #667085;
  font-size: 16px;
}

.card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  padding: 18px;
  margin-bottom: 18px;
}

textarea {
  width: 100%;
  height: 130px;
  border: 1px solid #d0d5dd;
  border-radius: 14px;
  padding: 16px;
  font-size: 18px;
  resize: none;
}

.status {
  margin-top: 8px;
  font-size: 13px;
  color: #667085;
}

.result-card {
  display: none;
  background: #fff;
  border-radius: 18px;
  padding: 20px;
}

.main-result {
  font-size: 22px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f8fbff;
  border: 1px solid #e2e8f0;
  cursor: pointer;
}

.options {
  display: none;
  margin-top: 12px;
  gap: 8px;
}

.option-card {
  display: grid;
  grid-template-columns: 80px 1fr 1fr;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  cursor: pointer;
  align-items: center;
}

.option-card:hover {
  background: #f4f8ff;
}

.option-card.active {
  background: #eaf2ff;
  border-color: #2563eb;
}

.option-label {
  font-size: 12px;
  font-weight: bold;
  color: #2563eb;
}

.option-english {
  font-size: 14px;
}

.option-chinese {
  font-size: 13px;
  color: #667085;
}

.actions {
  margin-top: 12px;
}

button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.copy-btn {
  background: #16a34a;
  color: white;
}

.clear-btn {
  background: #eef2f7;
}

@media (max-width: 700px) {
  .option-card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="logo">FluentReply</div>
    <div class="subtitle">AI translation with natural expressions</div>
  </div>

  <div class="card">
    <textarea id="input" placeholder="输入中文..."></textarea>
    <div id="status" class="status">自动翻译中...</div>
  </div>

  <div id="output" class="result-card">
    <div id="mainText" class="main-result" onclick="toggleOptions()"></div>
    <div id="options" class="options"></div>

    <div class="actions">
      <button class="copy-btn" onclick="copyText()">Copy</button>
      <button class="clear-btn" onclick="clearAll()">Clear</button>
    </div>
  </div>

</div>

<script>
let currentText = "";
let timer;
let optionsVisible = false;

const input = document.getElementById("input");
const statusBox = document.getElementById("status");
const output = document.getElementById("output");
const mainText = document.getElementById("mainText");
const options = document.getElementById("options");

input.addEventListener("input", () => {
  clearTimeout(timer);

  if (!input.value.trim()) {
    output.style.display = "none";
    return;
  }

  timer = setTimeout(translate, 600);
});

async function translate() {
  statusBox.innerText = "翻译中...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text: input.value })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      statusBox.innerText = "出错了";
      return;
    }

    output.style.display = "block";
    currentText = data.main;
    mainText.innerText = data.main;

    renderOptions(data.options);

    statusBox.innerText = "完成";
  } catch {
    statusBox.innerText = "网络错误";
  }
}

function renderOptions(list) {
  options.innerHTML = "";

  list.forEach((opt, i) => {
    const card = document.createElement("div");
    card.className = "option-card" + (i === 0 ? " active" : "");

    card.innerHTML = `
      <div class="option-label">${opt.label}</div>
      <div class="option-english">${opt.english}</div>
      <div class="option-chinese">${opt.chinese_meaning}</div>
    `;

    card.onclick = () => {
      document.querySelectorAll(".option-card").forEach(el => el.classList.remove("active"));
      card.classList.add("active");
      currentText = opt.english;
      mainText.innerText = opt.english;
      options.style.display = "none";
      optionsVisible = false;
    };

    options.appendChild(card);
  });
}

function toggleOptions() {
  if (!options.innerHTML) return;

  optionsVisible = !optionsVisible;
  options.style.display = optionsVisible ? "grid" : "none";
}

function copyText() {
  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function clearAll() {
  input.value = "";
  output.style.display = "none";
}
</script>

</body>
</html>
