<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #f6f8fc;
  color: #111827;
}

.app {
  max-width: 1180px;
  margin: auto;
  padding: 28px 16px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.logo {
  font-size: 30px;
  font-weight: 800;
  color: #2563eb;
}

.badge {
  background: #e8f0ff;
  color: #2563eb;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  background: white;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}

.panel-head {
  height: 52px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e5e7eb;
  color: #2563eb;
  font-weight: 800;
}

textarea {
  width: 100%;
  height: 250px;
  border: none;
  outline: none;
  resize: none;
  padding: 22px;
  font-size: 21px;
  line-height: 1.55;
}

.result-box {
  min-height: 250px;
  padding: 22px;
  background: #fbfdff;
}

.placeholder {
  color: #9ca3af;
  font-size: 20px;
}

.full-translation {
  font-size: 21px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.panel-foot {
  height: 52px;
  padding: 0 18px;
  border-top: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #6b7280;
  font-size: 13px;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-weight: 700;
}

.copy {
  background: #16a34a;
  color: white;
}

.clear {
  background: #eef2f7;
  color: #334155;
}

.segments-wrap {
  margin-top: 18px;
  display: none;
}

.segments-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 12px;
}

.segment-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.04);
}

.segment-main {
  padding: 14px 16px;
  cursor: pointer;
}

.segment-source {
  font-size: 13px;
  color: #667085;
  margin-bottom: 6px;
}

.segment-best {
  font-size: 18px;
  line-height: 1.45;
}

.segment-options {
  display: none;
  border-top: 1px solid #eef2f7;
}

.option-row {
  display: grid;
  grid-template-columns: 90px 1fr 1fr;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid #eef2f7;
  align-items: center;
}

.option-row:last-child {
  border-bottom: none;
}

.option-row:hover,
.option-row.active {
  background: #eaf2ff;
}

.option-label {
  color: #2563eb;
  font-size: 12px;
  font-weight: 900;
}

.option-text {
  font-size: 15px;
  line-height: 1.45;
}

.option-meaning {
  font-size: 13px;
  color: #667085;
  line-height: 1.45;
}

.status {
  margin-top: 14px;
  color: #667085;
  font-size: 14px;
}

.footer-actions {
  margin-top: 16px;
  display: flex;
  gap: 10px;
}

.error {
  color: #b00020;
}

@media (max-width: 800px) {
  .translator {
    grid-template-columns: 1fr;
  }

  textarea,
  .result-box {
    height: 190px;
    min-height: 190px;
    font-size: 18px;
  }

  .option-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="logo">FluentReply</div>
    <div class="badge">AI Sentence Translator</div>
  </div>

  <section class="translator">
    <div class="panel">
      <div class="panel-head">
        <span>输入</span>
        <span id="detectedLang">Auto Detect</span>
      </div>

      <textarea id="input" placeholder="输入中文或英文，系统会自动分句翻译"></textarea>

      <div class="panel-foot">
        <span id="count">0 字符</span>
        <button class="btn clear" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span id="targetLang">翻译结果</span>
        <span>按句选择表达</span>
      </div>

      <div id="resultBox" class="result-box">
        <span class="placeholder">完整翻译会显示在这里</span>
      </div>

      <div class="panel-foot">
        <span id="status">等待输入</span>
        <button class="btn copy" onclick="copyText()">Copy</button>
      </div>
    </div>
  </section>

  <section id="segmentsWrap" class="segments-wrap">
    <div class="segments-title">逐句选择表达</div>
    <div id="segments"></div>
  </section>

  <div class="footer-actions">
    <button class="btn copy" onclick="copyText()">复制整段结果</button>
    <button class="btn clear" onclick="clearAll()">清空</button>
  </div>
</div>

<script>
let timer;
let currentSegments = [];
let currentFullText = "";

const input = document.getElementById("input");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const resultBox = document.getElementById("resultBox");
const segmentsWrap = document.getElementById("segmentsWrap");
const segments = document.getElementById("segments");
const detectedLang = document.getElementById("detectedLang");
const targetLang = document.getElementById("targetLang");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length + " 字符";

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 800);
});

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  statusBox.innerText = "AI 正在分句翻译...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      resultBox.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    detectedLang.innerText = data.detected_language || "Auto Detect";
    targetLang.innerText = data.target_language || "翻译结果";

    currentSegments = (data.segments || []).map(seg => ({
      source: seg.source || "",
      selected: seg.best || "",
      options: seg.options || []
    }));

    rebuildFullText();
    renderSegments();

    statusBox.innerText = "翻译完成";

  } catch (err) {
    resultBox.innerHTML = `<span class="error">Network error. Please try again.</span>`;
    statusBox.innerText = "网络错误";
  }
}

function renderSegments() {
  segments.innerHTML = "";

  currentSegments.forEach((seg, segIndex) => {
    const card = document.createElement("div");
    card.className = "segment-card";

    const main = document.createElement("div");
    main.className = "segment-main";
    main.innerHTML = `
      <div class="segment-source">${escapeHTML(seg.source)}</div>
      <div class="segment-best">${escapeHTML(seg.selected)}</div>
    `;

    const optionsBox = document.createElement("div");
    optionsBox.className = "segment-options";

    seg.options.forEach((opt, optIndex) => {
      const row = document.createElement("div");
      row.className = "option-row" + (opt.text === seg.selected || optIndex === 0 ? " active" : "");

      row.innerHTML = `
        <div class="option-label">${escapeHTML(opt.label || "Option")}</div>
        <div class="option-text">${escapeHTML(opt.text || "")}</div>
        <div class="option-meaning">${escapeHTML(opt.meaning || "")}</div>
      `;

      row.onclick = (e) => {
        e.stopPropagation();

        seg.selected = opt.text || "";
        main.querySelector(".segment-best").innerText = seg.selected;

        optionsBox.querySelectorAll(".option-row").forEach(el => {
          el.classList.remove("active");
        });
        row.classList.add("active");

        optionsBox.style.display = "none";
        rebuildFullText();
      };

      optionsBox.appendChild(row);
    });

    main.onclick = () => {
      optionsBox.style.display =
        optionsBox.style.display === "block" ? "none" : "block";
    };

    card.appendChild(main);
    card.appendChild(optionsBox);
    segments.appendChild(card);
  });

  segmentsWrap.style.display = currentSegments.length ? "block" : "none";
}

function rebuildFullText() {
  currentFullText = currentSegments.map(seg => seg.selected).join(" ");
  resultBox.innerHTML = `<div class="full-translation">${escapeHTML(currentFullText)}</div>`;
}

function copyText() {
  if (!currentFullText) return;
  navigator.clipboard.writeText(currentFullText);
  statusBox.innerText = "已复制";
}

function clearAll() {
  input.value = "";
  count.innerText = "0 字符";
  clearResultOnly();
}

function clearResultOnly() {
  currentSegments = [];
  currentFullText = "";
  detectedLang.innerText = "Auto Detect";
  targetLang.innerText = "翻译结果";
  resultBox.innerHTML = '<span class="placeholder">完整翻译会显示在这里</span>';
  segments.innerHTML = "";
  segmentsWrap.style.display = "none";
  statusBox.innerText = "等待输入";
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
