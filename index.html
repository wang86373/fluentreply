<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply Translate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Segoe UI", sans-serif;
  background: #fff;
  color: #202124;
}

.header {
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 26px;
  border-bottom: 1px solid #e0e0e0;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: #1a73e8;
}

.header button {
  border: none;
  background: transparent;
  cursor: pointer;
  color: #5f6368;
  font-size: 14px;
}

.app {
  max-width: 1280px;
  margin: 28px auto;
  padding: 0 20px;
}

.lang-row {
  display: grid;
  grid-template-columns: 1fr 46px 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.lang-tabs {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 0 10px;
}

.lang-tabs select {
  border: none;
  border-bottom: 2px solid #1a73e8;
  padding: 9px 4px;
  font-size: 15px;
  font-weight: 700;
  color: #1a73e8;
  background: transparent;
  outline: none;
}

.swap {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border: none;
  background: transparent;
  color: #5f6368;
  font-size: 26px;
  cursor: pointer;
}

.swap:hover {
  color: #1a73e8;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid #dadce0;
  border-radius: 16px;
  overflow: hidden;
  background: #fff;
}

textarea {
  width: 100%;
  height: 250px;
  border: none;
  outline: none;
  resize: none;
  padding: 24px;
  font-size: 25px;
  line-height: 1.4;
  font-family: Arial, "Segoe UI", sans-serif;
}

.result {
  height: 250px;
  padding: 24px;
  font-size: 25px;
  line-height: 1.4;
  background: #f1f5ff;
  position: relative;
  cursor: pointer;
  overflow-y: auto;
}

.placeholder {
  color: #9aa0a6;
  font-size: 22px;
}

.panel-footer {
  height: 54px;
  border-top: 1px solid #dadce0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  color: #5f6368;
  font-size: 13px;
}

.footer-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  border: none;
  background: transparent;
  cursor: pointer;
  color: #5f6368;
  font-size: 14px;
  padding: 6px 8px;
  border-radius: 8px;
}

.btn:hover {
  background: #f1f3f4;
}

.copy-btn {
  border: none;
  background: #1a73e8;
  color: white;
  padding: 8px 17px;
  border-radius: 20px;
  font-weight: 700;
  cursor: pointer;
}

.copy-btn:hover {
  background: #155fc0;
}

.dropdown {
  display: none;
  position: absolute;
  left: 22px;
  top: 62px;
  width: min(520px, calc(100% - 44px));
  max-height: 185px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid #dadce0;
  border-radius: 10px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.18);
  z-index: 20;
}

.dropdown-item {
  padding: 9px 12px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:hover,
.dropdown-item.active {
  background: #e8f0fe;
}

.dropdown-label {
  color: #1a73e8;
  font-size: 11px;
  font-weight: 800;
  margin-bottom: 4px;
}

.dropdown-text {
  font-size: 14px;
  line-height: 1.35;
  color: #202124;
  margin-bottom: 4px;
}

.dropdown-meaning {
  font-size: 12px;
  line-height: 1.35;
  color: #5f6368;
}

.status {
  margin-top: 16px;
  color: #5f6368;
  font-size: 14px;
}

.history {
  display: none;
  margin-top: 24px;
  border: 1px solid #dadce0;
  border-radius: 14px;
  padding: 14px;
}

.history-title {
  font-weight: 700;
  margin-bottom: 10px;
}

.history-item {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  margin-bottom: 8px;
  cursor: pointer;
  background: #fafafa;
}

.history-item:hover {
  background: #e8f0fe;
}

.error {
  color: #b00020;
}

@media (max-width: 850px) {
  .header {
    height: 56px;
    padding: 0 14px;
  }

  .logo {
    font-size: 18px;
  }

  .app {
    margin: 16px auto;
    padding: 0 12px;
  }

  .lang-row {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .swap {
    display: none;
  }

  .translator {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  textarea,
  .result {
    height: 170px;
    font-size: 18px;
    padding: 14px;
  }

  .panel-footer {
    height: 44px;
    padding: 0 12px;
    font-size: 12px;
  }

  .copy-btn {
    padding: 6px 12px;
    font-size: 13px;
  }

  .dropdown {
    left: 12px;
    top: 48px;
    width: calc(100% - 24px);
    max-height: 145px;
  }

  .dropdown-item {
    padding: 7px 9px;
  }

  .dropdown-text {
    font-size: 13px;
  }

  .dropdown-meaning {
    font-size: 11px;
  }

  .lang-tabs {
    gap: 10px;
    padding: 0 4px;
  }

  .lang-tabs select {
    font-size: 13px;
  }
}
</style>
</head>

<body>
  <div class="header">
    <div class="logo">FluentReply 翻译</div>
    <button onclick="toggleHistory()">History</button>
  </div>

  <main class="app">
    <div class="lang-row">
      <div class="lang-tabs">
        <select id="sourceSelect" onchange="changeSourceLanguage()">
          <option value="auto">检测到的语言</option>
          <option value="Simplified Chinese">中文</option>
          <option value="English">英语</option>
          <option value="Japanese">日语</option>
          <option value="Korean">韩语</option>
          <option value="Spanish">西班牙语</option>
          <option value="French">法语</option>
          <option value="German">德语</option>
          <option value="Russian">俄语</option>
          <option value="Thai">泰语</option>
          <option value="Vietnamese">越南语</option>
          <option value="Burmese">缅甸语</option>
          <option value="Arabic">阿拉伯语</option>
        </select>
      </div>

      <button class="swap" onclick="swapLanguages()">⇄</button>

      <div class="lang-tabs">
        <select id="targetSelect" onchange="changeTargetLanguage()">
          <option value="">自动</option>
          <option value="English" selected>英语</option>
          <option value="Simplified Chinese">中文</option>
          <option value="Japanese">日语</option>
          <option value="Korean">韩语</option>
          <option value="Spanish">西班牙语</option>
          <option value="French">法语</option>
          <option value="German">德语</option>
          <option value="Russian">俄语</option>
          <option value="Thai">泰语</option>
          <option value="Vietnamese">越南语</option>
          <option value="Burmese">缅甸语</option>
          <option value="Arabic">阿拉伯语</option>
        </select>
      </div>
    </div>

    <section class="translator">
      <div class="panel">
        <textarea id="input" placeholder="请输入文本..."></textarea>

        <div class="panel-footer">
          <span id="count">0</span>
          <div class="footer-actions">
            <button class="btn" onclick="speakInput()">🔊</button>
            <button class="btn" onclick="clearAll()">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div id="result" class="result" onclick="toggleDropdown(event)">
          <span class="placeholder">翻译结果会显示在这里</span>
          <div id="dropdown" class="dropdown"></div>
        </div>

        <div class="panel-footer">
          <span id="status">等待输入</span>
          <div class="footer-actions">
            <button class="btn" onclick="speakOutput(event)">🔊</button>
            <button class="copy-btn" onclick="copyText(event)">复制</button>
          </div>
        </div>
      </div>
    </section>

    <div id="bottomStatus" class="status"></div>

    <section id="historyBox" class="history">
      <div class="history-title">最近翻译记录</div>
      <div id="historyList"></div>
    </section>
  </main>

<script>
let timer;
let currentText = "";
let currentOptions = [];
let dropdownVisible = false;

const input = document.getElementById("input");
const result = document.getElementById("result");
const dropdown = document.getElementById("dropdown");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const bottomStatus = document.getElementById("bottomStatus");
const sourceSelect = document.getElementById("sourceSelect");
const targetSelect = document.getElementById("targetSelect");
const historyBox = document.getElementById("historyBox");
const historyList = document.getElementById("historyList");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length;

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 700);
});

function changeSourceLanguage() {
  if (input.value.trim()) translate();
}

function changeTargetLanguage() {
  if (input.value.trim()) translate();
}

function swapLanguages() {
  const source = sourceSelect.value;
  const target = targetSelect.value;

  if (source !== "auto") {
    sourceSelect.value = target || "auto";
    targetSelect.value = source;
  } else {
    if (targetSelect.value === "English") {
      targetSelect.value = "Simplified Chinese";
    } else {
      targetSelect.value = "English";
    }
  }

  if (input.value.trim()) translate();
}

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  const sourceLanguage = sourceSelect.value;
  const targetLanguage = targetSelect.value;

  const cacheKey = "google_dropdown_lang_v1_" + sourceLanguage + "_" + targetLanguage + "_" + text;
  const cached = localStorage.getItem(cacheKey);

  if (cached) {
    renderData(JSON.parse(cached));
    statusBox.innerText = "来自缓存";
    return;
  }

  statusBox.innerText = "AI 正在翻译...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text,
        sourceLanguage,
        targetLanguage
      })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      result.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span><div id="dropdown" class="dropdown"></div>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    localStorage.setItem(cacheKey, JSON.stringify(data));
    saveHistory(text, data);
    renderData(data);

  } catch {
    result.innerHTML = `<span class="error">Network error. Please try again.</span><div id="dropdown" class="dropdown"></div>`;
    statusBox.innerText = "网络错误";
  }
}

function renderData(data) {
  currentText = data.main || "";
  currentOptions = data.options || [];

  renderMainText(currentText);
  renderDropdown(currentOptions);

  statusBox.innerText = "翻译完成";
  bottomStatus.innerText = "点击翻译结果可查看 3 个替代表达。";
}

function renderMainText(text) {
  result.innerHTML = `
    <span>${escapeHTML(text)}</span>
    <div id="dropdown" class="dropdown"></div>
  `;
}

function renderDropdown(optionsList) {
  const dd = document.getElementById("dropdown");
  dd.innerHTML = "";

  optionsList.forEach((opt, index) => {
    const item = document.createElement("div");
    item.className = "dropdown-item" + (index === 0 ? " active" : "");

    item.innerHTML = `
      <div class="dropdown-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="dropdown-text">${escapeHTML(opt.text || "")}</div>
      <div class="dropdown-meaning">${escapeHTML(opt.meaning || "（无翻译）")}</div>
    `;

    item.onclick = (e) => {
      e.stopPropagation();

      currentText = opt.text || "";
      renderMainText(currentText);
      renderDropdown(optionsList);
      hideDropdown();

      statusBox.innerText = "已选择表达";
    };

    dd.appendChild(item);
  });

  hideDropdown();
}

function toggleDropdown(event) {
  event.stopPropagation();

  const dd = document.getElementById("dropdown");
  if (!dd || !dd.innerHTML.trim()) return;

  dropdownVisible = dd.style.display !== "block";
  dd.style.display = dropdownVisible ? "block" : "none";
}

function hideDropdown() {
  const dd = document.getElementById("dropdown");
  if (dd) dd.style.display = "none";
  dropdownVisible = false;
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function speakInput() {
  speak(input.value.trim(), langCode(sourceSelect.value));
}

function speakOutput(event) {
  if (event) event.stopPropagation();
  speak(currentText, langCode(targetSelect.value || "English"));
}

function speak(text, lang) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  if (lang) utterance.lang = lang;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function langCode(lang) {
  const map = {
    "Simplified Chinese": "zh-CN",
    "English": "en-US",
    "Japanese": "ja-JP",
    "Korean": "ko-KR",
    "Spanish": "es-ES",
    "French": "fr-FR",
    "German": "de-DE",
    "Russian": "ru-RU",
    "Thai": "th-TH",
    "Vietnamese": "vi-VN",
    "Burmese": "my-MM",
    "Arabic": "ar-SA"
  };

  return map[lang] || "";
}

function clearAll() {
  input.value = "";
  count.innerText = "0";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  currentOptions = [];
  result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span><div id="dropdown" class="dropdown"></div>';
  statusBox.innerText = "等待输入";
  bottomStatus.innerText = "";
}

function saveHistory(source, data) {
  const history = JSON.parse(localStorage.getItem("history_google_dropdown") || "[]");

  history.unshift({
    source,
    result: data.main || "",
    from: sourceSelect.value,
    to: targetSelect.value,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history_google_dropdown", JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history_google_dropdown") || "[]");
  historyList.innerHTML = "";

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <strong>${escapeHTML(item.source)}</strong><br>
      ${escapeHTML(item.result)}<br>
      <small>${escapeHTML(item.from || "auto")} → ${escapeHTML(item.to || "auto")} · ${escapeHTML(item.time)}</small>
    `;

    div.onclick = () => {
      input.value = item.source;
      sourceSelect.value = item.from || "auto";
      targetSelect.value = item.to || "";
      count.innerText = item.source.length;
      translate();
    };

    historyList.appendChild(div);
  });
}

function toggleHistory() {
  renderHistory();
  historyBox.style.display = historyBox.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", hideDropdown);

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
