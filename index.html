<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #f6f8fc;
  color: #111827;
}

.app {
  max-width: 1180px;
  margin: auto;
  padding: 28px 16px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.logo {
  font-size: 30px;
  font-weight: 800;
  color: #2563eb;
}

.badge {
  background: #e8f0ff;
  color: #2563eb;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  background: white;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}

.panel-head {
  height: 52px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e5e7eb;
  color: #2563eb;
  font-weight: 800;
}

textarea {
  width: 100%;
  height: 230px;
  border: none;
  outline: none;
  resize: none;
  padding: 22px;
  font-size: 22px;
  line-height: 1.55;
}

.result {
  min-height: 230px;
  padding: 22px;
  font-size: 22px;
  line-height: 1.55;
  cursor: pointer;
  background: #fbfdff;
}

.placeholder {
  color: #9ca3af;
}

.panel-foot {
  height: 52px;
  padding: 0 18px;
  border-top: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #6b7280;
  font-size: 13px;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-weight: 700;
}

.copy {
  background: #16a34a;
  color: white;
}

.clear {
  background: #eef2f7;
  color: #334155;
}

.options-wrap {
  margin-top: 18px;
  display: none;
}

.options-title {
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 10px;
  color: #374151;
}

.option-card {
  display: grid;
  grid-template-columns: 90px 1fr 1fr;
  gap: 12px;
  align-items: center;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 10px;
  cursor: pointer;
}

.option-card:hover,
.option-card.active {
  background: #eaf2ff;
  border-color: #2563eb;
}

.option-label {
  color: #2563eb;
  font-size: 12px;
  font-weight: 900;
}

.option-en {
  font-size: 15px;
  line-height: 1.45;
}

.option-cn {
  font-size: 13px;
  line-height: 1.45;
  color: #667085;
}

.status {
  margin-top: 14px;
  color: #667085;
  font-size: 14px;
}

.footer-actions {
  margin-top: 16px;
  display: flex;
  gap: 10px;
}

@media (max-width: 800px) {
  .translator {
    grid-template-columns: 1fr;
  }

  textarea,
  .result {
    height: 180px;
    font-size: 18px;
  }

  .option-card {
    grid-template-columns: 1fr;
    gap: 6px;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="logo">FluentReply</div>
    <div class="badge">AI Translator</div>
  </div>

  <section class="translator">
    <div class="panel">
      <div class="panel-head">
        <span>输入</span>
        <span>Auto Detect</span>
      </div>

      <textarea id="input" placeholder="输入中文，例如：你好呀。你现在在做什么？"></textarea>

      <div class="panel-foot">
        <span id="count">0 字符</span>
        <button class="btn clear" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span>英文翻译</span>
        <span>点击结果展开表达</span>
      </div>

      <div id="mainText" class="result" onclick="toggleOptions()">
        <span class="placeholder">英文翻译会显示在这里</span>
      </div>

      <div class="panel-foot">
        <span id="status">等待输入</span>
        <button class="btn copy" onclick="copyText()">Copy</button>
      </div>
    </div>
  </section>

  <section id="optionsWrap" class="options-wrap">
    <div class="options-title">不同英文表达</div>
    <div id="options"></div>
  </section>

  <div class="footer-actions">
    <button class="btn copy" onclick="copyText()">复制当前英文</button>
    <button class="btn clear" onclick="clearAll()">清空</button>
  </div>
</div>

<script>
let currentText = "";
let timer;
let optionsVisible = false;

const input = document.getElementById("input");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const mainText = document.getElementById("mainText");
const options = document.getElementById("options");
const optionsWrap = document.getElementById("optionsWrap");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length + " 字符";

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 700);
});

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  statusBox.innerText = "AI 正在翻译...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      mainText.innerHTML = `<span style="color:#b00020;">${escapeHTML(data.error || data.detail || "Translation failed.")}</span>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    currentText = data.main;
    mainText.innerText = data.main;

    renderOptions(data.options || []);
    statusBox.innerText = "翻译完成";

  } catch (err) {
    mainText.innerHTML = `<span style="color:#b00020;">Network error. Please try again.</span>`;
    statusBox.innerText = "网络错误";
  }
}

function renderOptions(list) {
  options.innerHTML = "";

  list.forEach((opt, index) => {
    const card = document.createElement("div");
    card.className = "option-card" + (index === 0 ? " active" : "");

    card.innerHTML = `
      <div class="option-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="option-en">${escapeHTML(opt.english || "")}</div>
      <div class="option-cn">${escapeHTML(opt.chinese_meaning || "")}</div>
    `;

    card.onclick = () => {
      document.querySelectorAll(".option-card").forEach(el => {
        el.classList.remove("active");
      });

      card.classList.add("active");
      currentText = opt.english || "";
      mainText.innerText = currentText;
      optionsVisible = false;
      optionsWrap.style.display = "none";
    };

    options.appendChild(card);
  });

  optionsVisible = false;
  optionsWrap.style.display = "none";
}

function toggleOptions() {
  if (!options.innerHTML.trim()) return;

  optionsVisible = !optionsVisible;
  optionsWrap.style.display = optionsVisible ? "block" : "none";
}

function copyText() {
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function clearAll() {
  input.value = "";
  count.innerText = "0 字符";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  optionsVisible = false;
  mainText.innerHTML = '<span class="placeholder">英文翻译会显示在这里</span>';
  options.innerHTML = "";
  optionsWrap.style.display = "none";
  statusBox.innerText = "等待输入";
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
