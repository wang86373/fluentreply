<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Segoe UI", sans-serif;
  background: #fff;
  color: #202124;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid #e0e0e0;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: #1a73e8;
}

.app {
  max-width: 1280px;
  margin: 32px auto;
  padding: 0 20px;
}

.lang-row {
  display: grid;
  grid-template-columns: 1fr 42px 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.lang-tabs {
  display: flex;
  gap: 24px;
  font-size: 15px;
  font-weight: 600;
  color: #5f6368;
  padding: 0 18px;
}

.lang-tabs span.active {
  color: #1a73e8;
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 10px;
}

.swap {
  text-align: center;
  font-size: 24px;
  color: #5f6368;
  cursor: pointer;
  user-select: none;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid #dadce0;
  border-radius: 16px;
  overflow: hidden;
}

textarea {
  width: 100%;
  height: 240px;
  border: none;
  outline: none;
  resize: none;
  padding: 24px;
  font-size: 26px;
  line-height: 1.35;
}

.result {
  height: 240px;
  padding: 24px;
  font-size: 26px;
  line-height: 1.35;
  background: #f1f5ff;
  position: relative;
  cursor: pointer;
  overflow-y: auto;
}

.placeholder {
  color: #9aa0a6;
  font-size: 22px;
}

.panel-footer {
  height: 56px;
  border-top: 1px solid #dadce0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  color: #5f6368;
  font-size: 13px;
}

.btn {
  border: none;
  background: transparent;
  cursor: pointer;
  color: #5f6368;
  font-size: 14px;
}

.copy-btn {
  background: #1a73e8;
  color: white;
  padding: 9px 18px;
  border-radius: 20px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  left: 18px;
  top: 56px;
  width: min(480px, calc(100% - 36px));
  max-height: 180px;
  overflow-y: auto;
  background: white;
  border: 1px solid #dadce0;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.16);
  z-index: 20;
  font-size: 14px;
}

.dropdown-item {
  padding: 9px 12px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:hover,
.dropdown-item.active {
  background: #e8f0fe;
}

.dropdown-label {
  color: #1a73e8;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 4px;
}

.dropdown-text {
  color: #202124;
  font-size: 14px;
  line-height: 1.35;
  margin-bottom: 4px;
}

.dropdown-meaning {
  color: #5f6368;
  font-size: 12px;
  line-height: 1.35;
}

.status {
  margin-top: 18px;
  color: #5f6368;
  font-size: 14px;
}

.history {
  margin-top: 28px;
  display: none;
}

.history-title {
  font-weight: 700;
  margin-bottom: 10px;
}

.history-item {
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  background: #fafafa;
}

.history-item:hover {
  background: #e8f0fe;
}

.paywall {
  display: none;
  margin-top: 18px;
  padding: 18px;
  border: 1px solid #dadce0;
  border-radius: 12px;
  background: #fff8e1;
}

.error { color: #b00020; }

@media (max-width: 850px) {
  .app {
    margin: 16px auto;
    padding: 0 12px;
  }

  .translator {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .lang-row {
    grid-template-columns: 1fr;
  }

  .swap {
    display: none;
  }

  textarea,
  .result {
    height: 160px;
    font-size: 18px;
    padding: 14px;
  }

  .panel-footer {
    height: 44px;
    padding: 0 12px;
    font-size: 12px;
  }

  .copy-btn {
    padding: 6px 12px;
    font-size: 13px;
    border-radius: 16px;
  }

  .btn {
    font-size: 13px;
  }

  .dropdown {
    top: 48px;
    max-height: 140px;
    font-size: 12px;
  }

  .dropdown-item {
    padding: 6px 8px;
  }

  .dropdown-text {
    font-size: 13px;
  }

  .dropdown-meaning {
    font-size: 11px;
  }

  .lang-tabs {
    font-size: 13px;
    gap: 16px;
    padding: 0 8px;
  }

  .header {
    height: 56px;
    padding: 0 16px;
  }

  .logo {
    font-size: 18px;
  }
}
</style>
</head>

<body>
  <div class="header">
    <div class="logo">FluentReply 翻译</div>
    <button class="btn" onclick="toggleHistory()">History</button>
  </div>

  <main class="app">
    <div class="lang-row">
      <div class="lang-tabs">
        <span id="sourceLang" class="active">检测到的语言</span>
        <span>中文</span>
        <span>英语</span>
      </div>

      <div class="swap" onclick="swapLanguages()">⇄</div>

      <div class="lang-tabs">
        <span id="targetLang" class="active">英语</span>
        <span>中文</span>
      </div>
    </div>

    <section class="translator">
      <div class="panel">
        <textarea id="input" placeholder="请输入中文或英文..."></textarea>

        <div class="panel-footer">
          <span id="count">0</span>
          <div>
            <button class="btn" onclick="speakInput()">🔊</button>
            <button class="btn" onclick="clearAll()">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div id="result" class="result" onclick="toggleDropdown(event)">
          <span class="placeholder">翻译结果会显示在这里</span>
          <div id="dropdown" class="dropdown"></div>
        </div>

        <div class="panel-footer">
          <div>
            <button class="btn" onclick="feedback(true)">👍</button>
            <button class="btn" onclick="feedback(false)">👎</button>
          </div>

          <span id="status">等待输入</span>

          <div>
            <button class="btn" onclick="speakOutput(event)">🔊</button>
            <button class="copy-btn" onclick="copyText(event)">复制</button>
          </div>
        </div>
      </div>
    </section>

    <div id="bottomStatus" class="status"></div>

    <div id="paywall" class="paywall">
      免费 200 次已用完。请升级后继续使用。
      <br><br>
      <button class="copy-btn" onclick="goPay()">Upgrade</button>
    </div>

    <section id="historyBox" class="history">
      <div class="history-title">最近翻译记录</div>
      <div id="historyList"></div>
    </section>
  </main>

<script>
const FREE_LIMIT = 200;
const PAYMENT_LINK = "YOUR_PAYMENT_LINK_HERE";

let timer;
let currentText = "";
let dropdownVisible = false;
let currentOptions = [];
let forcedTarget = "";

const input = document.getElementById("input");
const result = document.getElementById("result");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const bottomStatus = document.getElementById("bottomStatus");
const sourceLang = document.getElementById("sourceLang");
const targetLang = document.getElementById("targetLang");
const paywall = document.getElementById("paywall");
const historyBox = document.getElementById("historyBox");
const historyList = document.getElementById("historyList");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length;

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 700);
});

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  if (getUsage() >= FREE_LIMIT && !isPro()) {
    paywall.style.display = "block";
    statusBox.innerText = "免费次数已用完";
    return;
  }

  const cacheKey = "cache_v3_" + text + "_" + forcedTarget;
  const cached = localStorage.getItem(cacheKey);

  if (cached) {
    renderData(JSON.parse(cached));
    statusBox.innerText = "来自缓存";
    return;
  }

  statusBox.innerText = "AI 正在翻译...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text,
        targetLanguage: forcedTarget
      })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      result.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span><div id="dropdown" class="dropdown"></div>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    increaseUsage();
    localStorage.setItem(cacheKey, JSON.stringify(data));
    saveHistory(text, data);
    renderData(data);

  } catch {
    result.innerHTML = `<span class="error">Network error. Please try again.</span><div id="dropdown" class="dropdown"></div>`;
    statusBox.innerText = "网络错误";
  }
}

function renderData(data) {
  currentText = data.main || "";
  currentOptions = data.options || [];

  sourceLang.innerText = data.detected_language || "检测到的语言";
  targetLang.innerText = data.target_language || "翻译结果";

  renderMainText(currentText);
  renderDropdown(currentOptions);

  statusBox.innerText = "翻译完成";
  bottomStatus.innerText = "点击翻译结果可查看 3 个替代表达。";
}

function renderMainText(text) {
  result.innerHTML = `
    <span>${escapeHTML(text)}</span>
    <div id="dropdown" class="dropdown"></div>
  `;
}

function renderDropdown(optionsList) {
  const dd = document.getElementById("dropdown");
  dd.innerHTML = "";

  optionsList.forEach((opt, index) => {
    const item = document.createElement("div");
    item.className = "dropdown-item" + (index === 0 ? " active" : "");

    item.innerHTML = `
      <div class="dropdown-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="dropdown-text">${escapeHTML(opt.text || "")}</div>
      <div class="dropdown-meaning">${escapeHTML(opt.meaning || "（无翻译）")}</div>
    `;

    item.onclick = (e) => {
      e.stopPropagation();

      currentText = opt.text || "";
      renderMainText(currentText);
      renderDropdown(optionsList);
      hideDropdown();

      statusBox.innerText = "已选择表达";
    };

    dd.appendChild(item);
  });

  hideDropdown();
}

function toggleDropdown(event) {
  event.stopPropagation();

  const dd = document.getElementById("dropdown");
  if (!dd || !dd.innerHTML.trim()) return;

  dropdownVisible = dd.style.display !== "block";
  dd.style.display = dropdownVisible ? "block" : "none";
}

function hideDropdown() {
  const dd = document.getElementById("dropdown");
  if (dd) dd.style.display = "none";
  dropdownVisible = false;
}

function swapLanguages() {
  if (targetLang.innerText.includes("English") || targetLang.innerText.includes("英语")) {
    forcedTarget = "Simplified Chinese";
    targetLang.innerText = "Simplified Chinese";
  } else {
    forcedTarget = "English";
    targetLang.innerText = "English";
  }

  if (input.value.trim()) translate();
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function feedback(isGood) {
  if (!currentText) return;

  const feedbackData = JSON.parse(localStorage.getItem("feedback") || "[]");

  feedbackData.push({
    input: input.value,
    output: currentText,
    good: isGood,
    time: new Date().toISOString()
  });

  localStorage.setItem("feedback", JSON.stringify(feedbackData));

  statusBox.innerText = isGood ? "已记录 👍" : "已记录 👎";
}

function speakInput() {
  speak(input.value.trim(), "auto");
}

function speakOutput(event) {
  if (event) event.stopPropagation();

  const lang =
    targetLang.innerText.includes("Chinese") ||
    targetLang.innerText.includes("中文")
      ? "zh-CN"
      : "en-US";

  speak(currentText, lang);
}

function speak(text, lang) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  if (lang !== "auto") utterance.lang = lang;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function clearAll() {
  input.value = "";
  count.innerText = "0";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  currentOptions = [];
  sourceLang.innerText = "检测到的语言";
  targetLang.innerText = forcedTarget || "英语";
  result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span><div id="dropdown" class="dropdown"></div>';
  statusBox.innerText = "等待输入";
  bottomStatus.innerText = "";
}

function getUsage() {
  return Number(localStorage.getItem("usage_count") || "0");
}

function increaseUsage() {
  localStorage.setItem("usage_count", String(getUsage() + 1));
}

function isPro() {
  return localStorage.getItem("pro_user") === "true";
}

function goPay() {
  if (PAYMENT_LINK === "YOUR_PAYMENT_LINK_HERE") {
    alert("请先设置支付链接");
    return;
  }
  window.location.href = PAYMENT_LINK;
}

function saveHistory(source, data) {
  const history = JSON.parse(localStorage.getItem("history") || "[]");

  history.unshift({
    source,
    result: data.main,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history", JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history") || "[]");
  historyList.innerHTML = "";

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <strong>${escapeHTML(item.source)}</strong><br>
      ${escapeHTML(item.result)}<br>
      <small>${escapeHTML(item.time)}</small>
    `;

    div.onclick = () => {
      input.value = item.source;
      count.innerText = item.source.length;
      translate();
    };

    historyList.appendChild(div);
  });
}

function toggleHistory() {
  renderHistory();
  historyBox.style.display = historyBox.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", hideDropdown);

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
