<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.header{display:flex;justify-content:space-between;padding:14px 20px;background:white;border-bottom:1px solid #eee}
.logo{font-weight:700;color:#1a73e8}
.container{max-width:1100px;margin:30px auto;padding:0 16px}

.lang-bar{display:flex;justify-content:space-between;margin-bottom:10px}
select{padding:8px;border-radius:10px;border:1px solid #ddd}

.card{display:grid;grid-template-columns:1fr 1fr;background:white;border-radius:16px;overflow:hidden}
.panel{padding:20px}
textarea{width:100%;height:220px;font-size:20px;border:none;outline:none}

.result{font-size:20px;min-height:220px}
.segment{cursor:pointer;padding:3px 5px;border-radius:6px}
.segment:hover{background:#e8f0fe}

.dropdown{position:absolute;background:white;border-radius:10px;box-shadow:0 10px 20px rgba(0,0,0,.15)}
.option{padding:10px;border-bottom:1px solid #eee;cursor:pointer}
.option:hover{background:#f5f5f5}

.footer{display:flex;justify-content:space-between;margin-top:10px}
.engine{color:#1a73e8;font-weight:600}

.history{margin-top:20px;background:white;padding:15px;border-radius:12px}
.history-item{padding:8px;border-bottom:1px solid #eee;cursor:pointer}
.history-item:hover{background:#f3f6ff}

@media(max-width:800px){
.card{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">FluentReply</div>
  <select id="engineMode" onchange="translate()">
    <option value="auto">Auto</option>
    <option value="deepl">DeepL</option>
    <option value="ai">AI</option>
  </select>
</div>

<div class="container">

  <div class="lang-bar">
    <select id="source">
      <option value="auto">Auto</option>
      <option value="English">English</option>
      <option value="Simplified Chinese">中文</option>
    </select>

    <select id="target">
      <option value="English">English</option>
      <option value="Simplified Chinese">中文</option>
    </select>
  </div>

  <div class="card">
    <div class="panel">
      <textarea id="input" placeholder="Enter text..."></textarea>
    </div>

    <div class="panel">
      <div id="result" class="result">Translation here</div>
      <div id="dropdown"></div>

      <div class="footer">
        <span id="engineStatus" class="engine"></span>
        <button onclick="copyText()">Copy</button>
      </div>
    </div>
  </div>

  <div class="history">
    <h3>History</h3>
    <div id="historyBox"></div>
  </div>

</div>

<script>

const SUPABASE_URL = "https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY = "sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser=null;
let segments=[];
let fullText="";

document.getElementById("input").addEventListener("input", debounce(translate,600));

function debounce(fn,delay){
  let t;
  return ()=>{clearTimeout(t);t=setTimeout(fn,delay)}
}

async function translate(){
  const text=input.value.trim();
  if(!text) return;

  const res=await fetch("/.netlify/functions/translate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      text,
      sourceLanguage:source.value,
      targetLanguage:target.value,
      engineMode:engineMode.value
    })
  });

  const data=await res.json();
  render(data);
}

function render(data){
  document.getElementById("engineStatus").innerText=data.engine_used;

  segments=data.segments||[];
  fullText=data.full_translation||"";

  const box=document.getElementById("result");
  box.innerHTML="";

  segments.forEach((seg,i)=>{
    const span=document.createElement("span");
    span.className="segment";
    span.innerText=seg.best+" ";
    span.onclick=()=>showOptions(i);
    box.appendChild(span);
  });

  saveHistory(data);
}

function showOptions(i){
  const seg=segments[i];
  const box=document.getElementById("dropdown");
  box.innerHTML="";

  seg.options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerHTML=`<b>${opt.label}</b><br>${opt.text}`;
    div.onclick=()=>{
      segments[i].best=opt.text;
      render({segments,full_translation:fullText,engine_used:engineStatus.innerText});
      box.innerHTML="";
    };
    box.appendChild(div);
  });
}

function copyText(){
  navigator.clipboard.writeText(fullText);
}

async function saveHistory(data){

  const item={
    text:input.value,
    result:data.full_translation
  };

  const history=JSON.parse(localStorage.getItem("history")||"[]");
  history.unshift(item);
  localStorage.setItem("history",JSON.stringify(history.slice(0,20)));

  if(currentUser){
    await supabaseClient.from("translation_history").insert({
      user_id:currentUser.id,
      source_text:item.text,
      result_text:item.result
    });
  }

  loadHistoryLocal();
}

function loadHistoryLocal(){
  const history=JSON.parse(localStorage.getItem("history")||"[]");
  const box=document.getElementById("historyBox");
  box.innerHTML="";

  history.forEach(item=>{
    const div=document.createElement("div");
    div.className="history-item";
    div.innerHTML=`<b>${item.text}</b><br>${item.result}`;
    div.onclick=()=>{
      input.value=item.text;
      translate();
    };
    box.appendChild(div);
  });
}

async function loadCloudHistory(){
  if(!currentUser) return;

  const {data}=await supabaseClient
    .from("translation_history")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(20);

  const history=data.map(i=>({
    text:i.source_text,
    result:i.result_text
  }));

  localStorage.setItem("history",JSON.stringify(history));
  loadHistoryLocal();
}

async function initAuth(){
  const {data}=await supabaseClient.auth.getUser();
  if(data.user){
    currentUser=data.user;
    await loadCloudHistory();
  }
}

loadHistoryLocal();
initAuth();

</script>

</body>
</html>
