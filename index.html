<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f3f6fb;
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 980px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #5f6368;
  font-size: 20px;
  margin-bottom: 32px;
}

textarea {
  width: 100%;
  height: 170px;
  padding: 22px;
  font-size: 26px;
  border-radius: 14px;
  border: 1px solid #ccc;
  resize: none;
  box-sizing: border-box;
}

.output {
  margin-top: 28px;
  background: white;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

.main-result {
  font-size: 30px;
  line-height: 1.4;
  margin-bottom: 24px;
}

.options {
  display: grid;
  gap: 14px;
}

.option-card {
  border: 1px solid #ddd;
  border-radius: 14px;
  padding: 18px;
  cursor: pointer;
  background: #fafafa;
}

.option-card:hover {
  background: #eaf2ff;
  border-color: #1a73e8;
}

.option-card.active {
  background: #e8f0fe;
  border-color: #1a73e8;
}

.option-label {
  font-size: 14px;
  color: #1a73e8;
  font-weight: bold;
  margin-bottom: 8px;
}

.option-english {
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 8px;
}

.option-chinese {
  font-size: 16px;
  line-height: 1.5;
  color: #5f6368;
}

.copy-btn {
  margin-top: 22px;
  padding: 12px 24px;
  background: #34a853;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  cursor: pointer;
}

.loading {
  text-align: center;
  color: #777;
  margin-top: 18px;
}

.error {
  color: #b00020;
}

@media (max-width: 700px) {
  h1 {
    font-size: 34px;
  }

  textarea {
    font-size: 22px;
  }

  .main-result {
    font-size: 24px;
  }

  .option-english {
    font-size: 19px;
  }
}
</style>
</head>

<body>
<div class="container">
  <h1>FluentReply</h1>
  <div class="subtitle">
    Translate your message into natural English with Chinese meanings
  </div>

  <textarea id="input" placeholder="输入中文，例如：你好呀。你在做什么"></textarea>

  <div id="loading" class="loading" style="display:none;">Translating...</div>

  <div id="output" class="output" style="display:none;">
    <div id="mainText" class="main-result"></div>
    <div id="options" class="options"></div>
    <button class="copy-btn" onclick="copyText()">Copy</button>
  </div>
</div>

<script>
let currentText = "";
let timer;

const input = document.getElementById("input");
const loading = document.getElementById("loading");
const output = document.getElementById("output");
const mainText = document.getElementById("mainText");
const options = document.getElementById("options");

input.addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(translate, 800);
});

async function translate() {
  const text = input.value.trim();

  if (!text) {
    output.style.display = "none";
    loading.style.display = "none";
    return;
  }

  loading.style.display = "block";
  output.style.display = "none";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    loading.style.display = "none";
    output.style.display = "block";

    if (!res.ok || data.error) {
      mainText.innerHTML = `<span class="error">${data.error || data.detail || "Translation failed."}</span>`;
      options.innerHTML = "";
      return;
    }

    currentText = data.main;
    mainText.innerText = data.main;

    renderOptions(data.options || []);
  } catch (err) {
    loading.style.display = "none";
    output.style.display = "block";
    mainText.innerHTML = `<span class="error">Network error. Please try again.</span>`;
    options.innerHTML = "";
  }
}

function renderOptions(list) {
  options.innerHTML = "";

  list.forEach((opt, index) => {
    const card = document.createElement("div");
    card.className = "option-card" + (index === 0 ? " active" : "");

    card.innerHTML = `
      <div class="option-label">${opt.label || "Option"}</div>
      <div class="option-english">${opt.english || ""}</div>
      <div class="option-chinese">${opt.chinese_meaning || ""}</div>
    `;

    card.onclick = () => {
      document.querySelectorAll(".option-card").forEach(el => {
        el.classList.remove("active");
      });

      card.classList.add("active");
      currentText = opt.english;
      mainText.innerText = opt.english;
    };

    options.appendChild(card);
  });
}

function copyText() {
  if (!currentText) return;
  navigator.clipboard.writeText(currentText);
  alert("Copied!");
}
</script>
</body>
</html>
