<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Segoe UI", sans-serif;
  background: #fff;
  color: #202124;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid #e0e0e0;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: #1a73e8;
}

.app {
  max-width: 1280px;
  margin: 32px auto;
  padding: 0 20px;
}

.lang-row {
  display: grid;
  grid-template-columns: 1fr 42px 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.lang-tabs {
  display: flex;
  gap: 24px;
  font-size: 15px;
  font-weight: 600;
  color: #5f6368;
  padding: 0 18px;
}

.lang-tabs span.active {
  color: #1a73e8;
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 10px;
}

.swap {
  text-align: center;
  font-size: 24px;
  color: #5f6368;
  cursor: pointer;
  user-select: none;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid #dadce0;
  border-radius: 16px;
  overflow: hidden;
}

textarea {
  width: 100%;
  height: 250px;
  border: none;
  outline: none;
  resize: none;
  padding: 24px;
  font-size: 24px;
  line-height: 1.4;
}

.result {
  height: 250px;
  padding: 20px;
  font-size: 21px;
  line-height: 1.45;
  background: #f1f5ff;
  overflow-y: auto;
}

.placeholder {
  color: #9aa0a6;
  font-size: 21px;
}

.segment {
  display: inline;
  cursor: pointer;
  border-radius: 6px;
  padding: 2px 4px;
}

.segment:hover {
  background: #dbeafe;
}

.segment.active {
  background: #bfdbfe;
}

.panel-footer {
  height: 56px;
  border-top: 1px solid #dadce0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  color: #5f6368;
  font-size: 13px;
}

.btn {
  border: none;
  background: transparent;
  cursor: pointer;
  color: #5f6368;
  font-size: 14px;
}

.copy-btn {
  background: #1a73e8;
  color: white;
  padding: 9px 18px;
  border-radius: 20px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

.options-box {
  display: none;
  margin-top: 16px;
  border: 1px solid #dadce0;
  border-radius: 12px;
  overflow: hidden;
  background: white;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.options-title {
  padding: 10px 14px;
  font-size: 13px;
  color: #5f6368;
  border-bottom: 1px solid #eef2f7;
  background: #fafafa;
}

.option-item {
  padding: 10px 14px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.option-item:last-child {
  border-bottom: none;
}

.option-item:hover,
.option-item.active {
  background: #e8f0fe;
}

.option-label {
  color: #1a73e8;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 4px;
}

.option-text {
  color: #202124;
  font-size: 15px;
  line-height: 1.4;
  margin-bottom: 4px;
}

.option-meaning {
  color: #5f6368;
  font-size: 12px;
  line-height: 1.35;
}

.status {
  margin-top: 18px;
  color: #5f6368;
  font-size: 14px;
}

.history {
  margin-top: 28px;
  display: none;
}

.history-title {
  font-weight: 700;
  margin-bottom: 10px;
}

.history-item {
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  background: #fafafa;
}

.history-item:hover {
  background: #e8f0fe;
}

.selection-bar {
  margin-top: 12px;
  display: none;
  padding: 12px;
  background: #f8fbff;
  border: 1px solid #dbeafe;
  border-radius: 10px;
}

.selection-text {
  font-size: 14px;
  color: #334155;
  margin-bottom: 8px;
}

.error { color: #b00020; }

@media (max-width: 850px) {
  .app {
    margin: 16px auto;
    padding: 0 12px;
  }

  .translator {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .lang-row {
    grid-template-columns: 1fr;
  }

  .swap {
    display: none;
  }

  textarea,
  .result {
    height: 170px;
    font-size: 18px;
    padding: 14px;
  }

  .panel-footer {
    height: 44px;
    padding: 0 12px;
    font-size: 12px;
  }

  .copy-btn {
    padding: 6px 12px;
    font-size: 13px;
    border-radius: 16px;
  }

  .btn {
    font-size: 13px;
  }

  .lang-tabs {
    font-size: 13px;
    gap: 16px;
    padding: 0 8px;
  }

  .header {
    height: 56px;
    padding: 0 16px;
  }

  .logo {
    font-size: 18px;
  }

  .option-text {
    font-size: 13px;
  }

  .option-meaning {
    font-size: 11px;
  }
}
</style>
</head>

<body>
  <div class="header">
    <div class="logo">FluentReply 翻译</div>
    <button class="btn" onclick="toggleHistory()">History</button>
  </div>

  <main class="app">
    <div class="lang-row">
      <div class="lang-tabs">
        <span id="sourceLang" class="active">检测到的语言</span>
        <span>中文</span>
        <span>英语</span>
      </div>

      <div class="swap" onclick="swapLanguages()">⇄</div>

      <div class="lang-tabs">
        <span id="targetLang" class="active">英语</span>
        <span>中文</span>
      </div>
    </div>

    <section class="translator">
      <div class="panel">
        <textarea id="input" placeholder="请输入中文或英文。选中文字后可单独翻译..."></textarea>

        <div class="panel-footer">
          <span id="count">0</span>
          <div>
            <button class="btn" onclick="speakInput()">🔊</button>
            <button class="btn" onclick="clearAll()">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div id="result" class="result">
          <span class="placeholder">翻译结果会显示在这里</span>
        </div>

        <div class="panel-footer">
          <span id="status">等待输入</span>
          <div>
            <button class="btn" onclick="speakOutput(event)">🔊</button>
            <button class="copy-btn" onclick="copyText(event)">复制</button>
          </div>
        </div>
      </div>
    </section>

    <div id="selectionBar" class="selection-bar">
      <div id="selectionText" class="selection-text"></div>
      <button class="copy-btn" onclick="translateSelectedText()">翻译选中内容</button>
    </div>

    <div id="optionsBox" class="options-box">
      <div id="optionsTitle" class="options-title">当前句子的其他表达</div>
      <div id="optionsList"></div>
    </div>

    <div id="bottomStatus" class="status"></div>

    <section id="historyBox" class="history">
      <div class="history-title">最近翻译记录</div>
      <div id="historyList"></div>
    </section>
  </main>

<script>
let timer;
let currentText = "";
let currentSegments = [];
let activeSegmentIndex = null;
let forcedTarget = "";

const input = document.getElementById("input");
const result = document.getElementById("result");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const bottomStatus = document.getElementById("bottomStatus");
const sourceLang = document.getElementById("sourceLang");
const targetLang = document.getElementById("targetLang");
const historyBox = document.getElementById("historyBox");
const historyList = document.getElementById("historyList");
const optionsBox = document.getElementById("optionsBox");
const optionsList = document.getElementById("optionsList");
const optionsTitle = document.getElementById("optionsTitle");
const selectionBar = document.getElementById("selectionBar");
const selectionText = document.getElementById("selectionText");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length;

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(() => translateText(text, "full"), 800);
});

input.addEventListener("mouseup", handleSelection);
input.addEventListener("keyup", handleSelection);

function handleSelection() {
  const selected = input.value.substring(input.selectionStart, input.selectionEnd).trim();

  if (selected) {
    selectionBar.style.display = "block";
    selectionText.innerText = "已选择：" + selected;
  } else {
    selectionBar.style.display = "none";
    selectionText.innerText = "";
  }
}

async function translateSelectedText() {
  const selected = input.value.substring(input.selectionStart, input.selectionEnd).trim();

  if (!selected) return;

  selectionBar.style.display = "none";
  await translateText(selected, "selected");
}

async function translateText(text, mode) {
  if (!text) return;

  statusBox.innerText = mode === "selected" ? "AI 正在翻译选中内容..." : "AI 正在翻译...";

  const cacheKey = "seg_cache_v1_" + text + "_" + forcedTarget + "_" + mode;
  const cached = localStorage.getItem(cacheKey);

  if (cached) {
    renderData(JSON.parse(cached), mode);
    statusBox.innerText = "来自缓存";
    return;
  }

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text,
        targetLanguage: forcedTarget,
        mode
      })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      result.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    localStorage.setItem(cacheKey, JSON.stringify(data));
    saveHistory(text, data);
    renderData(data, mode);

  } catch {
    result.innerHTML = `<span class="error">Network error. Please try again.</span>`;
    statusBox.innerText = "网络错误";
  }
}

function renderData(data, mode) {
  currentSegments = (data.segments || []).map((seg, index) => ({
    id: seg.id || index + 1,
    source: seg.source || "",
    selected: seg.best || "",
    options: seg.options || []
  }));

  if (!currentSegments.length && data.full_translation) {
    currentSegments = [{
      id: 1,
      source: input.value,
      selected: data.full_translation,
      options: []
    }];
  }

  sourceLang.innerText = data.detected_language || "检测到的语言";
  targetLang.innerText = data.target_language || "翻译结果";

  activeSegmentIndex = null;
  rebuildFullText();
  renderSegments();

  optionsBox.style.display = "none";
  statusBox.innerText = mode === "selected" ? "选中内容翻译完成" : "翻译完成";
  bottomStatus.innerText = "点击右侧某一句，可查看这句话的 3 个替代表达。";
}

function rebuildFullText() {
  currentText = currentSegments.map(seg => seg.selected).join(" ");
}

function renderSegments() {
  result.innerHTML = "";

  if (!currentSegments.length) {
    result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span>';
    return;
  }

  currentSegments.forEach((seg, index) => {
    const span = document.createElement("span");
    span.className = "segment" + (activeSegmentIndex === index ? " active" : "");
    span.innerText = seg.selected + " ";

    span.onclick = (e) => {
      e.stopPropagation();
      showSegmentOptions(index);
    };

    result.appendChild(span);
  });
}

function showSegmentOptions(index) {
  activeSegmentIndex = index;
  renderSegments();

  const seg = currentSegments[index];
  optionsTitle.innerText = "当前句子：" + seg.source;
  optionsList.innerHTML = "";

  if (!seg.options || !seg.options.length) {
    optionsList.innerHTML = '<div class="option-item">暂无其他表达</div>';
    optionsBox.style.display = "block";
    return;
  }

  seg.options.forEach((opt, optIndex) => {
    const item = document.createElement("div");
    item.className = "option-item" + (opt.text === seg.selected || optIndex === 0 ? " active" : "");

    item.innerHTML = `
      <div class="option-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="option-text">${escapeHTML(opt.text || "")}</div>
      <div class="option-meaning">${escapeHTML(opt.meaning || "（无翻译）")}</div>
    `;

    item.onclick = () => {
      currentSegments[index].selected = opt.text || "";
      rebuildFullText();
      renderSegments();
      showSegmentOptions(index);
      statusBox.innerText = "已替换当前句子";
    };

    optionsList.appendChild(item);
  });

  optionsBox.style.display = "block";
}

function swapLanguages() {
  if (targetLang.innerText.includes("English") || targetLang.innerText.includes("英语")) {
    forcedTarget = "Simplified Chinese";
    targetLang.innerText = "Simplified Chinese";
  } else {
    forcedTarget = "English";
    targetLang.innerText = "English";
  }

  if (input.value.trim()) {
    translateText(input.value.trim(), "full");
  }
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function speakInput() {
  speak(input.value.trim(), "auto");
}

function speakOutput(event) {
  if (event) event.stopPropagation();

  const lang =
    targetLang.innerText.includes("Chinese") ||
    targetLang.innerText.includes("中文")
      ? "zh-CN"
      : "en-US";

  speak(currentText, lang);
}

function speak(text, lang) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  if (lang !== "auto") utterance.lang = lang;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function clearAll() {
  input.value = "";
  count.innerText = "0";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  currentSegments = [];
  activeSegmentIndex = null;
  sourceLang.innerText = "检测到的语言";
  targetLang.innerText = forcedTarget || "英语";
  result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span>';
  optionsBox.style.display = "none";
  optionsList.innerHTML = "";
  statusBox.innerText = "等待输入";
  bottomStatus.innerText = "";
  selectionBar.style.display = "none";
}

function saveHistory(source, data) {
  const history = JSON.parse(localStorage.getItem("history_v2") || "[]");

  history.unshift({
    source,
    result: data.full_translation || "",
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history_v2", JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history_v2") || "[]");
  historyList.innerHTML = "";

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <strong>${escapeHTML(item.source)}</strong><br>
      ${escapeHTML(item.result)}<br>
      <small>${escapeHTML(item.time)}</small>
    `;

    div.onclick = () => {
      input.value = item.source;
      count.innerText = item.source.length;
      translateText(item.source, "full");
    };

    historyList.appendChild(div);
  });
}

function toggleHistory() {
  renderHistory();
  historyBox.style.display = historyBox.style.display === "block" ? "none" : "block";
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
