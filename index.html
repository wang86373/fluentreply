<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f3f6fb;
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
  font-size: 40px;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
}

textarea {
  width: 100%;
  height: 150px;
  padding: 20px;
  font-size: 22px;
  border-radius: 12px;
  border: 1px solid #ccc;
  resize: none;
  box-sizing: border-box;
}

.output {
  margin-top: 25px;
  background: white;
  padding: 25px;
  border-radius: 16px;
}

.main-result {
  font-size: 28px;
  cursor: pointer;
  margin-bottom: 15px;
}

.options {
  display: none;
  gap: 12px;
}

.option-card {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 14px;
  background: #fafafa;
  cursor: pointer;
}

.option-card:hover {
  background: #eef4ff;
}

.option-label {
  font-size: 13px;
  color: #1a73e8;
  font-weight: bold;
  margin-bottom: 5px;
}

.option-english {
  font-size: 18px;
  margin-bottom: 6px;
}

.option-chinese {
  font-size: 14px;
  color: #666;
}

.copy-btn {
  margin-top: 18px;
  padding: 10px 20px;
  background: #34a853;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.loading {
  margin-top: 15px;
  color: #777;
}

.error {
  color: red;
}
</style>
</head>

<body>
<div class="container">
  <h1>FluentReply</h1>
  <div class="subtitle">点击英文可展开不同表达方式</div>

  <textarea id="input" placeholder="输入中文..."></textarea>

  <div id="loading" class="loading" style="display:none;">Translating...</div>

  <div id="output" class="output" style="display:none;">
    <div id="mainText" class="main-result" onclick="toggleOptions()"></div>
    <div id="options" class="options"></div>
    <button class="copy-btn" onclick="copyText()">Copy</button>
  </div>
</div>

<script>
let currentText = "";
let timer;
let optionsVisible = false;

const input = document.getElementById("input");
const loading = document.getElementById("loading");
const output = document.getElementById("output");
const mainText = document.getElementById("mainText");
const options = document.getElementById("options");

input.addEventListener("input", () => {
  clearTimeout(timer);
  timer = setTimeout(translate, 600);
});

async function translate() {
  const text = input.value.trim();

  if (!text) {
    output.style.display = "none";
    return;
  }

  loading.style.display = "block";
  output.style.display = "none";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    loading.style.display = "none";
    output.style.display = "block";

    if (!res.ok || data.error) {
      mainText.innerHTML = `<span class="error">${data.error}</span>`;
      options.innerHTML = "";
      return;
    }

    currentText = data.main;
    mainText.innerText = data.main;

    renderOptions(data.options);

  } catch (err) {
    loading.style.display = "none";
    output.style.display = "block";
    mainText.innerHTML = `<span class="error">Network error</span>`;
  }
}

function renderOptions(list) {
  options.innerHTML = "";

  list.forEach(opt => {
    const card = document.createElement("div");
    card.className = "option-card";

    card.innerHTML = `
      <div class="option-label">${opt.label}</div>
      <div class="option-english">${opt.english}</div>
      <div class="option-chinese">${opt.chinese_meaning}</div>
    `;

    card.onclick = () => {
      currentText = opt.english;
      mainText.innerText = opt.english;
    };

    options.appendChild(card);
  });

  options.style.display = "none";
  optionsVisible = false;
}

function toggleOptions() {
  if (!options.innerHTML) return;

  optionsVisible = !optionsVisible;
  options.style.display = optionsVisible ? "grid" : "none";
}

function copyText() {
  navigator.clipboard.writeText(currentText);
  alert("Copied!");
}
</script>
</body>
</html>
