<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #f7f9fc 0%, #ffffff 45%);
  color: #111827;
}

.header {
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid #e5e7eb;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  font-size: 24px;
  font-weight: 800;
  color: #0f172a;
}

.logo span {
  color: #1a73e8;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.app {
  max-width: 1240px;
  margin: 30px auto;
  padding: 0 18px;
}

.language-bar {
  display: grid;
  grid-template-columns: 1fr 44px 1fr;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.lang-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
}

.lang-label {
  color: #64748b;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

select {
  border: none;
  outline: none;
  background: transparent;
  color: #1a73e8;
  font-size: 15px;
  font-weight: 800;
  width: 100%;
}

.swap {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid #dbe3ef;
  background: white;
  color: #1a73e8;
  display: grid;
  place-items: center;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
}

.swap:hover {
  background: #eef6ff;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.panel {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 16px 42px rgba(15, 23, 42, 0.08);
}

.panel-head {
  height: 54px;
  padding: 0 18px;
  border-bottom: 1px solid #edf0f5;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title {
  font-size: 14px;
  font-weight: 800;
  color: #0f172a;
}

.panel-sub {
  font-size: 12px;
  color: #64748b;
}

textarea {
  width: 100%;
  height: 270px;
  border: none;
  outline: none;
  resize: none;
  padding: 22px;
  font-size: 22px;
  line-height: 1.55;
  color: #111827;
}

.result {
  height: 270px;
  padding: 22px;
  font-size: 21px;
  line-height: 1.6;
  background: #f8fbff;
  overflow-y: auto;
}

.placeholder {
  color: #94a3b8;
}

.segment {
  display: inline;
  padding: 2px 5px;
  border-radius: 7px;
  cursor: pointer;
  transition: 0.12s ease;
}

.segment:hover {
  background: #dbeafe;
}

.segment.active {
  background: #bfdbfe;
}

.panel-footer {
  height: 58px;
  padding: 0 18px;
  border-top: 1px solid #edf0f5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #64748b;
  font-size: 13px;
}

.footer-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  border: none;
  background: transparent;
  color: #64748b;
  cursor: pointer;
  font-size: 14px;
  border-radius: 10px;
  padding: 8px 10px;
}

.btn:hover {
  background: #f1f5f9;
}

.primary-btn {
  border: none;
  background: #1a73e8;
  color: white;
  cursor: pointer;
  font-size: 14px;
  font-weight: 800;
  border-radius: 999px;
  padding: 9px 18px;
}

.primary-btn:hover {
  background: #155fc0;
}

.selection-bar {
  display: none;
  margin-top: 16px;
  background: #eef6ff;
  border: 1px solid #cfe3ff;
  border-radius: 16px;
  padding: 14px 16px;
}

.selection-text {
  color: #334155;
  font-size: 14px;
  margin-bottom: 10px;
}

.options-box {
  display: none;
  margin-top: 18px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
}

.options-title {
  padding: 13px 16px;
  background: #f8fafc;
  color: #475569;
  font-size: 13px;
  font-weight: 800;
  border-bottom: 1px solid #edf0f5;
}

.option-item {
  padding: 13px 16px;
  border-bottom: 1px solid #edf0f5;
  cursor: pointer;
  transition: 0.12s ease;
}

.option-item:last-child {
  border-bottom: none;
}

.option-item:hover,
.option-item.active {
  background: #eaf2ff;
}

.option-label {
  color: #1a73e8;
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 5px;
}

.option-text {
  color: #111827;
  font-size: 15px;
  line-height: 1.45;
  margin-bottom: 5px;
}

.option-meaning {
  color: #64748b;
  font-size: 13px;
  line-height: 1.45;
}

.status {
  margin-top: 16px;
  color: #64748b;
  font-size: 14px;
}

.history {
  display: none;
  margin-top: 24px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  padding: 16px;
  box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
}

.history-title {
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 12px;
}

.history-item {
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #edf0f5;
  margin-bottom: 10px;
  cursor: pointer;
  background: #fafafa;
}

.history-item:hover {
  background: #eaf2ff;
}

.error {
  color: #b00020;
}

@media (max-width: 850px) {
  .header {
    height: 58px;
    padding: 0 16px;
  }

  .logo {
    font-size: 19px;
  }

  .app {
    margin: 16px auto;
    padding: 0 12px;
  }

  .language-bar {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .swap {
    display: none;
  }

  .translator {
    grid-template-columns: 1fr;
    gap: 12px;
  }

  textarea,
  .result {
    height: 180px;
    font-size: 18px;
    padding: 15px;
  }

  .panel-footer {
    height: 48px;
    padding: 0 12px;
  }

  .panel-head {
    height: 48px;
    padding: 0 12px;
  }

  .primary-btn {
    padding: 7px 12px;
    font-size: 13px;
  }

  .btn {
    padding: 6px 8px;
    font-size: 13px;
  }

  .option-text {
    font-size: 13px;
  }

  .option-meaning {
    font-size: 11px;
  }
}
</style>
</head>

<body>
  <header class="header">
    <div class="logo"><span>FluentReply</span> 翻译</div>
    <div class="header-actions">
      <button class="btn" onclick="toggleHistory()">History</button>
    </div>
  </header>

  <main class="app">
    <section class="language-bar">
      <div class="lang-card">
        <span class="lang-label">源语言</span>
        <select disabled>
          <option>自动检测</option>
        </select>
      </div>

      <button class="swap" onclick="swapLanguages()">⇄</button>

      <div class="lang-card">
        <span class="lang-label">目标语言</span>
        <select id="targetSelect" onchange="changeTargetLanguage()">
          <option value="">自动</option>
          <option value="English">英语</option>
          <option value="Simplified Chinese">中文</option>
          <option value="Japanese">日语</option>
          <option value="Korean">韩语</option>
          <option value="Spanish">西班牙语</option>
          <option value="French">法语</option>
          <option value="German">德语</option>
          <option value="Russian">俄语</option>
          <option value="Thai">泰语</option>
          <option value="Vietnamese">越南语</option>
          <option value="Burmese">缅甸语</option>
          <option value="Arabic">阿拉伯语</option>
        </select>
      </div>
    </section>

    <section class="translator">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">输入</div>
            <div class="panel-sub">选中文字可单独翻译</div>
          </div>
        </div>

        <textarea id="input" placeholder="请输入任意语言..."></textarea>

        <div class="panel-footer">
          <span id="count">0 字符</span>
          <div class="footer-group">
            <button class="btn" onclick="speakInput()">🔊</button>
            <button class="btn" onclick="clearAll()">清空</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">翻译结果</div>
            <div class="panel-sub">点击某一句查看替代表达</div>
          </div>
        </div>

        <div id="result" class="result">
          <span class="placeholder">翻译结果会显示在这里</span>
        </div>

        <div class="panel-footer">
          <span id="status">等待输入</span>
          <div class="footer-group">
            <button class="btn" onclick="speakOutput(event)">🔊</button>
            <button class="primary-btn" onclick="copyText(event)">复制</button>
          </div>
        </div>
      </div>
    </section>

    <div id="selectionBar" class="selection-bar">
      <div id="selectionText" class="selection-text"></div>
      <button class="primary-btn" onclick="translateSelectedText()">翻译选中内容</button>
    </div>

    <div id="optionsBox" class="options-box">
      <div id="optionsTitle" class="options-title">当前句子的其他表达</div>
      <div id="optionsList"></div>
    </div>

    <div id="bottomStatus" class="status"></div>

    <section id="historyBox" class="history">
      <div class="history-title">最近翻译记录</div>
      <div id="historyList"></div>
    </section>
  </main>

<script>
let timer;
let currentText = "";
let currentSegments = [];
let activeSegmentIndex = null;
let forcedTarget = "";

const input = document.getElementById("input");
const result = document.getElementById("result");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const bottomStatus = document.getElementById("bottomStatus");
const historyBox = document.getElementById("historyBox");
const historyList = document.getElementById("historyList");
const optionsBox = document.getElementById("optionsBox");
const optionsList = document.getElementById("optionsList");
const optionsTitle = document.getElementById("optionsTitle");
const selectionBar = document.getElementById("selectionBar");
const selectionText = document.getElementById("selectionText");
const targetSelect = document.getElementById("targetSelect");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length + " 字符";

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(() => translateText(text, "full"), 800);
});

input.addEventListener("mouseup", handleSelection);
input.addEventListener("keyup", handleSelection);

function handleSelection() {
  const selected = input.value.substring(input.selectionStart, input.selectionEnd).trim();

  if (selected) {
    selectionBar.style.display = "block";
    selectionText.innerText = "已选择：" + selected;
  } else {
    selectionBar.style.display = "none";
    selectionText.innerText = "";
  }
}

function changeTargetLanguage() {
  forcedTarget = targetSelect.value;

  if (input.value.trim()) {
    translateText(input.value.trim(), "full");
  }
}

function swapLanguages() {
  if (targetSelect.value === "English") {
    targetSelect.value = "Simplified Chinese";
  } else {
    targetSelect.value = "English";
  }

  forcedTarget = targetSelect.value;

  if (input.value.trim()) {
    translateText(input.value.trim(), "full");
  }
}

async function translateSelectedText() {
  const selected = input.value.substring(input.selectionStart, input.selectionEnd).trim();
  if (!selected) return;

  selectionBar.style.display = "none";
  await translateText(selected, "selected");
}

async function translateText(text, mode) {
  if (!text) return;

  statusBox.innerText = mode === "selected" ? "AI 正在翻译选中内容..." : "AI 正在翻译...";

  const cacheKey = "hybrid_cache_v1_" + text + "_" + forcedTarget + "_" + mode;
  const cached = localStorage.getItem(cacheKey);

  if (cached) {
    renderData(JSON.parse(cached), mode);
    statusBox.innerText = "来自缓存";
    return;
  }

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text,
        targetLanguage: forcedTarget,
        mode
      })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      result.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    localStorage.setItem(cacheKey, JSON.stringify(data));
    saveHistory(text, data);
    renderData(data, mode);

  } catch {
    result.innerHTML = `<span class="error">Network error. Please try again.</span>`;
    statusBox.innerText = "网络错误";
  }
}

function renderData(data, mode) {
  currentSegments = (data.segments || []).map((seg, index) => ({
    id: seg.id || index + 1,
    source: seg.source || "",
    selected: seg.best || "",
    options: seg.options || []
  }));

  if (!currentSegments.length && data.full_translation) {
    currentSegments = [{
      id: 1,
      source: input.value,
      selected: data.full_translation,
      options: []
    }];
  }

  activeSegmentIndex = null;
  rebuildFullText();
  renderSegments();

  optionsBox.style.display = "none";
  statusBox.innerText = mode === "selected" ? "选中内容翻译完成" : "翻译完成";
  bottomStatus.innerText = "点击右侧某一句，可查看这句话的 3 个替代表达。";
}

function rebuildFullText() {
  currentText = currentSegments.map(seg => seg.selected).join(" ");
}

function renderSegments() {
  result.innerHTML = "";

  if (!currentSegments.length) {
    result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span>';
    return;
  }

  currentSegments.forEach((seg, index) => {
    const span = document.createElement("span");
    span.className = "segment" + (activeSegmentIndex === index ? " active" : "");
    span.innerText = seg.selected + " ";

    span.onclick = (e) => {
      e.stopPropagation();
      showSegmentOptions(index);
    };

    result.appendChild(span);
  });
}

function showSegmentOptions(index) {
  activeSegmentIndex = index;
  renderSegments();

  const seg = currentSegments[index];
  optionsTitle.innerText = "当前句子：" + seg.source;
  optionsList.innerHTML = "";

  if (!seg.options || !seg.options.length) {
    optionsList.innerHTML = '<div class="option-item">暂无其他表达</div>';
    optionsBox.style.display = "block";
    return;
  }

  seg.options.forEach((opt, optIndex) => {
    const item = document.createElement("div");
    item.className = "option-item" + (opt.text === seg.selected || optIndex === 0 ? " active" : "");

    item.innerHTML = `
      <div class="option-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="option-text">${escapeHTML(opt.text || "")}</div>
      <div class="option-meaning">${escapeHTML(opt.meaning || "（无翻译）")}</div>
    `;

    item.onclick = () => {
      currentSegments[index].selected = opt.text || "";
      rebuildFullText();
      renderSegments();
      showSegmentOptions(index);
      statusBox.innerText = "已替换当前句子";
    };

    optionsList.appendChild(item);
  });

  optionsBox.style.display = "block";
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function speakInput() {
  speak(input.value.trim(), "auto");
}

function speakOutput(event) {
  if (event) event.stopPropagation();

  const langMap = {
    "English": "en-US",
    "Simplified Chinese": "zh-CN",
    "Japanese": "ja-JP",
    "Korean": "ko-KR",
    "Spanish": "es-ES",
    "French": "fr-FR",
    "German": "de-DE",
    "Russian": "ru-RU",
    "Thai": "th-TH",
    "Vietnamese": "vi-VN",
    "Burmese": "my-MM",
    "Arabic": "ar-SA"
  };

  speak(currentText, langMap[forcedTarget] || "en-US");
}

function speak(text, lang) {
  if (!text) return;

  const utterance = new SpeechSynthesisUtterance(text);
  if (lang !== "auto") utterance.lang = lang;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function clearAll() {
  input.value = "";
  count.innerText = "0 字符";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  currentSegments = [];
  activeSegmentIndex = null;
  result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span>';
  optionsBox.style.display = "none";
  optionsList.innerHTML = "";
  statusBox.innerText = "等待输入";
  bottomStatus.innerText = "";
  selectionBar.style.display = "none";
}

function saveHistory(source, data) {
  const history = JSON.parse(localStorage.getItem("history_hybrid") || "[]");

  history.unshift({
    source,
    result: data.full_translation || "",
    target: forcedTarget || "auto",
    time: new Date().toLocaleString()
  });

  localStorage.setItem("history_hybrid", JSON.stringify(history.slice(0, 20)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("history_hybrid") || "[]");
  historyList.innerHTML = "";

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `
      <strong>${escapeHTML(item.source)}</strong><br>
      ${escapeHTML(item.result)}<br>
      <small>${escapeHTML(item.target)} · ${escapeHTML(item.time)}</small>
    `;

    div.onclick = () => {
      input.value = item.source;
      count.innerText = item.source.length + " 字符";
      forcedTarget = item.target === "auto" ? "" : item.target;
      targetSelect.value = forcedTarget;
      translateText(item.source, "full");
    };

    historyList.appendChild(div);
  });
}

function toggleHistory() {
  renderHistory();
  historyBox.style.display = historyBox.style.display === "block" ? "none" : "block";
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
