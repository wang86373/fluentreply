<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #f6f8fc;
  color: #111827;
}

.app {
  max-width: 1180px;
  margin: auto;
  padding: 28px 16px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.logo {
  font-size: 30px;
  font-weight: 800;
  color: #2563eb;
}

.badge {
  background: #e8f0ff;
  color: #2563eb;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  background: white;
  border-radius: 20px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}

.panel-head {
  height: 52px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e5e7eb;
  color: #2563eb;
  font-weight: 800;
}

textarea {
  width: 100%;
  height: 230px;
  border: none;
  outline: none;
  resize: none;
  padding: 22px;
  font-size: 21px;
  line-height: 1.55;
}

.result {
  min-height: 230px;
  padding: 22px;
  font-size: 21px;
  line-height: 1.55;
  cursor: pointer;
  background: #fbfdff;
  position: relative;
}

.placeholder {
  color: #9ca3af;
}

.panel-foot {
  height: 52px;
  padding: 0 18px;
  border-top: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #6b7280;
  font-size: 13px;
}

.btn {
  border: none;
  border-radius: 10px;
  padding: 9px 14px;
  cursor: pointer;
  font-weight: 700;
}

.copy {
  background: #16a34a;
  color: white;
}

.clear {
  background: #eef2f7;
  color: #334155;
}

.dropdown {
  display: none;
  position: absolute;
  left: 22px;
  top: 72px;
  width: min(520px, calc(100% - 44px));
  background: white;
  border: 1px solid #d0d5dd;
  border-radius: 12px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.16);
  overflow: hidden;
  z-index: 20;
}

.dropdown-item {
  padding: 12px 14px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:hover,
.dropdown-item.active {
  background: #eaf2ff;
}

.dropdown-label {
  color: #2563eb;
  font-size: 12px;
  font-weight: 900;
  margin-bottom: 5px;
}

.dropdown-text {
  font-size: 15px;
  line-height: 1.45;
  margin-bottom: 5px;
}

.dropdown-meaning {
  font-size: 13px;
  color: #667085;
  line-height: 1.45;
}

.status {
  margin-top: 14px;
  color: #667085;
  font-size: 14px;
}

.footer-actions {
  margin-top: 16px;
  display: flex;
  gap: 10px;
}

.error {
  color: #b00020;
}

@media (max-width: 800px) {
  .translator {
    grid-template-columns: 1fr;
  }

  textarea,
  .result {
    height: 180px;
    font-size: 18px;
  }

  .dropdown {
    top: 64px;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="logo">FluentReply</div>
    <div class="badge">AI Translator</div>
  </div>

  <section class="translator">
    <div class="panel">
      <div class="panel-head">
        <span>输入</span>
        <span id="detectedLang">Auto Detect</span>
      </div>

      <textarea id="input" placeholder="输入中文或英文，系统会自动判断翻译方向"></textarea>

      <div class="panel-foot">
        <span id="count">0 字符</span>
        <button class="btn clear" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span id="targetLang">翻译结果</span>
        <span>点击结果选择表达</span>
      </div>

      <div id="mainText" class="result" onclick="toggleDropdown(event)">
        <span class="placeholder">翻译会显示在这里</span>
        <div id="dropdown" class="dropdown"></div>
      </div>

      <div class="panel-foot">
        <span id="status">等待输入</span>
        <button class="btn copy" onclick="copyText(event)">Copy</button>
      </div>
    </div>
  </section>

  <div class="footer-actions">
    <button class="btn copy" onclick="copyText(event)">复制当前结果</button>
    <button class="btn clear" onclick="clearAll()">清空</button>
  </div>
</div>

<script>
let currentText = "";
let timer;
let dropdownVisible = false;

const input = document.getElementById("input");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const mainText = document.getElementById("mainText");
const dropdown = document.getElementById("dropdown");
const detectedLang = document.getElementById("detectedLang");
const targetLang = document.getElementById("targetLang");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length + " 字符";

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 700);
});

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  statusBox.innerText = "AI 正在翻译...";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      mainText.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span>`;
      statusBox.innerText = "翻译失败";
      dropdown.innerHTML = "";
      return;
    }

    currentText = data.main;
    mainText.childNodes[0].textContent = data.main;

    detectedLang.innerText = data.detected_language || "Auto Detect";
    targetLang.innerText = data.target_language || "翻译结果";

    renderDropdown(data.options || []);
    statusBox.innerText = "翻译完成";

  } catch (err) {
    mainText.innerHTML = `<span class="error">Network error. Please try again.</span><div id="dropdown" class="dropdown"></div>`;
    statusBox.innerText = "网络错误";
  }
}

function renderDropdown(list) {
  dropdown.innerHTML = "";

  list.forEach((opt, index) => {
    const item = document.createElement("div");
    item.className = "dropdown-item" + (index === 0 ? " active" : "");

    item.innerHTML = `
      <div class="dropdown-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="dropdown-text">${escapeHTML(opt.text || "")}</div>
      <div class="dropdown-meaning">${escapeHTML(opt.meaning || "")}</div>
    `;

    item.onclick = (e) => {
      e.stopPropagation();

      document.querySelectorAll(".dropdown-item").forEach(el => {
        el.classList.remove("active");
      });

      item.classList.add("active");
      currentText = opt.text || "";
      mainText.childNodes[0].textContent = currentText;
      dropdown.style.display = "none";
      dropdownVisible = false;
    };

    dropdown.appendChild(item);
  });

  dropdown.style.display = "none";
  dropdownVisible = false;
}

function toggleDropdown(event) {
  event.stopPropagation();

  if (!dropdown.innerHTML.trim()) return;

  dropdownVisible = !dropdownVisible;
  dropdown.style.display = dropdownVisible ? "block" : "none";
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function clearAll() {
  input.value = "";
  count.innerText = "0 字符";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  dropdownVisible = false;
  detectedLang.innerText = "Auto Detect";
  targetLang.innerText = "翻译结果";
  mainText.innerHTML = '<span class="placeholder">翻译会显示在这里</span><div id="dropdown" class="dropdown"></div>';
  statusBox.innerText = "等待输入";

  const newDropdown = document.getElementById("dropdown");
  dropdown.innerHTML = "";
  dropdown.style.display = "none";
}

document.addEventListener("click", () => {
  dropdown.style.display = "none";
  dropdownVisible = false;
});

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
