<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, "Segoe UI", sans-serif;
  background: #fff;
  color: #202124;
}

.header {
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  border-bottom: 1px solid #e0e0e0;
  font-size: 22px;
  font-weight: 600;
}

.logo-blue { color: #1a73e8; }

.app {
  max-width: 1280px;
  margin: 32px auto;
  padding: 0 20px;
}

.lang-row {
  display: grid;
  grid-template-columns: 1fr 42px 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.lang-tabs {
  display: flex;
  gap: 24px;
  font-size: 15px;
  font-weight: 600;
  color: #5f6368;
  padding: 0 18px;
}

.lang-tabs span.active {
  color: #1a73e8;
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 10px;
}

.swap {
  text-align: center;
  color: #5f6368;
  font-size: 24px;
}

.translator {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.panel {
  border: 1px solid #dadce0;
  border-radius: 16px;
  overflow: hidden;
  min-height: 270px;
}

textarea {
  width: 100%;
  height: 240px;
  border: none;
  outline: none;
  resize: none;
  padding: 24px;
  font-size: 26px;
  line-height: 1.35;
  font-family: Arial, sans-serif;
}

.result {
  height: 240px;
  padding: 24px;
  font-size: 26px;
  line-height: 1.35;
  background: #f1f5ff;
  position: relative;
  cursor: pointer;
  overflow-y: auto;
}

.placeholder {
  color: #9aa0a6;
  font-size: 22px;
}

.panel-footer {
  height: 56px;
  border-top: 1px solid #dadce0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  color: #5f6368;
  font-size: 13px;
}

.icon-btn {
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  color: #5f6368;
}

.copy-btn {
  border: none;
  background: #1a73e8;
  color: white;
  padding: 9px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
}

.dropdown {
  display: none;
  position: absolute;
  left: 22px;
  top: 62px;
  width: min(560px, calc(100% - 44px));
  max-height: 260px;
  overflow-y: auto;
  background: white;
  border: 1px solid #dadce0;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  z-index: 20;
  font-size: 15px;
}

.dropdown-item {
  padding: 12px 14px;
  border-bottom: 1px solid #eef2f7;
  cursor: pointer;
}

.dropdown-item:last-child {
  border-bottom: none;
}

.dropdown-item:hover,
.dropdown-item.active {
  background: #e8f0fe;
}

.dropdown-label {
  color: #1a73e8;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
}

.dropdown-text {
  color: #202124;
  font-size: 16px;
  line-height: 1.45;
  margin-bottom: 6px;
}

.dropdown-meaning {
  color: #5f6368;
  font-size: 13px;
  line-height: 1.45;
}

.status {
  margin-top: 18px;
  color: #5f6368;
  font-size: 14px;
}

.error {
  color: #b00020;
}

@media (max-width: 850px) {
  .lang-row {
    grid-template-columns: 1fr;
  }

  .swap {
    display: none;
  }

  .translator {
    grid-template-columns: 1fr;
  }

  textarea,
  .result {
    height: 200px;
    font-size: 22px;
  }

  .dropdown {
    top: 56px;
    max-height: 220px;
  }
}
</style>
</head>

<body>
  <div class="header">
    <span class="logo-blue">FluentReply</span>&nbsp;翻译
  </div>

  <main class="app">
    <div class="lang-row">
      <div class="lang-tabs">
        <span id="sourceLang" class="active">检测到的语言</span>
        <span>中文</span>
        <span>英语</span>
      </div>

      <div class="swap">⇄</div>

      <div class="lang-tabs">
        <span id="targetLang" class="active">英语</span>
        <span>中文</span>
        <span>日语</span>
      </div>
    </div>

    <section class="translator">
      <div class="panel">
        <textarea id="input" placeholder="请输入中文或英文..."></textarea>

        <div class="panel-footer">
          <span id="count">0</span>
          <button class="icon-btn" onclick="clearAll()">清空</button>
        </div>
      </div>

      <div class="panel">
        <div id="result" class="result" onclick="toggleDropdown(event)">
          <span class="placeholder">翻译结果会显示在这里</span>
          <div id="dropdown" class="dropdown"></div>
        </div>

        <div class="panel-footer">
          <span id="status">等待输入</span>
          <button class="copy-btn" onclick="copyText(event)">复制</button>
        </div>
      </div>
    </section>

    <div id="bottomStatus" class="status"></div>
  </main>

<script>
let timer;
let currentText = "";
let dropdownVisible = false;
let currentOptions = [];

const input = document.getElementById("input");
const result = document.getElementById("result");
const count = document.getElementById("count");
const statusBox = document.getElementById("status");
const bottomStatus = document.getElementById("bottomStatus");
const sourceLang = document.getElementById("sourceLang");
const targetLang = document.getElementById("targetLang");

input.addEventListener("input", () => {
  clearTimeout(timer);

  const text = input.value.trim();
  count.innerText = text.length;

  if (!text) {
    clearResultOnly();
    return;
  }

  statusBox.innerText = "准备翻译...";
  timer = setTimeout(translate, 700);
});

async function translate() {
  const text = input.value.trim();
  if (!text) return;

  statusBox.innerText = "AI 正在翻译...";
  bottomStatus.innerText = "";

  try {
    const res = await fetch("/.netlify/functions/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      result.innerHTML = `<span class="error">${escapeHTML(data.error || data.detail || "Translation failed.")}</span><div id="dropdown" class="dropdown"></div>`;
      statusBox.innerText = "翻译失败";
      return;
    }

    currentText = data.main || "";
    currentOptions = data.options || [];

    sourceLang.innerText = data.detected_language || "检测到的语言";
    targetLang.innerText = data.target_language || "翻译结果";

    renderMainText(currentText);
    renderDropdown(currentOptions);

    statusBox.innerText = "翻译完成";
    bottomStatus.innerText = "点击翻译结果可查看 3 个替代表达。";

  } catch (err) {
    result.innerHTML = `<span class="error">Network error. Please try again.</span><div id="dropdown" class="dropdown"></div>`;
    statusBox.innerText = "网络错误";
  }
}

function renderMainText(text) {
  result.innerHTML = `
    <span>${escapeHTML(text)}</span>
    <div id="dropdown" class="dropdown"></div>
  `;
}

function renderDropdown(optionsList) {
  const dd = document.getElementById("dropdown");
  dd.innerHTML = "";

  optionsList.forEach((opt, index) => {
    const item = document.createElement("div");
    item.className = "dropdown-item" + (index === 0 ? " active" : "");

    item.innerHTML = `
      <div class="dropdown-label">${escapeHTML(opt.label || "Option")}</div>
      <div class="dropdown-text">${escapeHTML(opt.text || "")}</div>
      <div class="dropdown-meaning">${escapeHTML(opt.meaning || "")}</div>
    `;

    item.onclick = (e) => {
      e.stopPropagation();

      currentText = opt.text || "";
      renderMainText(currentText);
      renderDropdown(optionsList);
      hideDropdown();

      statusBox.innerText = "已选择表达";
    };

    dd.appendChild(item);
  });

  hideDropdown();
}

function toggleDropdown(event) {
  event.stopPropagation();

  const dd = document.getElementById("dropdown");
  if (!dd || !dd.innerHTML.trim()) return;

  dropdownVisible = dd.style.display !== "block";
  dd.style.display = dropdownVisible ? "block" : "none";
}

function hideDropdown() {
  const dd = document.getElementById("dropdown");
  if (dd) dd.style.display = "none";
  dropdownVisible = false;
}

function copyText(event) {
  if (event) event.stopPropagation();
  if (!currentText) return;

  navigator.clipboard.writeText(currentText);
  statusBox.innerText = "已复制";
}

function clearAll() {
  input.value = "";
  count.innerText = "0";
  clearResultOnly();
}

function clearResultOnly() {
  currentText = "";
  currentOptions = [];
  sourceLang.innerText = "检测到的语言";
  targetLang.innerText = "英语";
  result.innerHTML = '<span class="placeholder">翻译结果会显示在这里</span><div id="dropdown" class="dropdown"></div>';
  statusBox.innerText = "等待输入";
  bottomStatus.innerText = "";
}

document.addEventListener("click", hideDropdown);

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, tag => {
    const chars = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "'": "&#39;",
      '"': "&quot;"
    };
    return chars[tag] || tag;
  });
}
</script>
</body>
</html>
