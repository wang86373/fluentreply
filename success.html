<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Payment Success - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#64748b;
  --border:#d1d5db;
  --blue:#1a73e8;
  --green:#16a34a;
  --shadow:0 18px 50px rgba(15,23,42,.10);
}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}
.card{
  width:100%;
  max-width:560px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:28px;
  padding:38px;
  text-align:center;
  box-shadow:var(--shadow);
}
.badge{
  width:72px;
  height:72px;
  border-radius:50%;
  background:#dcfce7;
  color:var(--green);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  margin:0 auto 18px;
}
h1{
  margin:0 0 12px;
  font-size:32px;
  color:var(--green);
}
p{
  color:var(--muted);
  line-height:1.6;
  margin:8px 0;
}
.status{
  margin-top:18px;
  padding:14px;
  border-radius:16px;
  background:#f1f5ff;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}
button{
  margin-top:22px;
  width:100%;
  border:none;
  border-radius:999px;
  padding:14px 22px;
  background:var(--blue);
  color:white;
  font-weight:900;
  cursor:pointer;
}
.secondary{
  background:white;
  color:var(--blue);
  border:1px solid var(--border);
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <div class="badge">✓</div>
  <h1>Payment Successful</h1>

  <p>Your payment has been received.</p>
  <p>Your Pro plan is being activated automatically.</p>

  <div id="status" class="status">
    Please wait 10–60 seconds, then return to FluentReply and refresh the page.
  </div>

  <button onclick="goHome()">Back to FluentReply</button>
  <button class="secondary" onclick="checkAgain()">Check Status Again</button>
</div>

<script>
const SUPABASE_URL = "https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY = "sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";

let supabaseClient = null;

try{
  if(window.supabase){
    supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );
  }else{
    setStatus("Supabase failed to load. Please refresh the page.");
  }
}catch(e){
  console.error("Supabase init failed:", e);
  setStatus("Supabase failed to load. Please refresh the page.");
}

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function goHome(){
  location.href = "index.html";
}

async function checkAgain(){
  setStatus("Checking your account status...");

  try{
    if(!supabaseClient){
      setStatus("Login system is not ready. Please refresh the page.");
      return;
    }

    const { data, error: userError } = await supabaseClient.auth.getUser();

    if(userError){
      console.error("Get user failed:", userError);
      setStatus("Could not check login status. Please refresh.");
      return;
    }

    const user = data?.user;

    if(!user){
      setStatus("Payment is complete. Please log in with the same email you used for payment.");
      return;
    }

    const { data: profile, error } = await supabaseClient
      .from("profiles")
      .select("*")
      .eq("email", user.email.toLowerCase())
      .maybeSingle();

    if(error){
      console.error("Profile check failed:", error);
      setStatus("Could not check profile yet. Please wait and refresh.");
      return;
    }

    if(
      profile?.is_pro &&
      (!profile.pro_until || new Date(profile.pro_until).getTime() > Date.now())
    ){
      setStatus("Your Pro plan is active. Redirecting...");
      setTimeout(()=>location.href="index.html",1000);
    }else{
      setStatus("Payment is complete, but Pro activation may still be processing. Please wait 10–60 seconds.");
    }

  }catch(e){
    console.error("Check status failed:", e);
    setStatus("Status check failed. Please refresh and try again.");
  }
}

setTimeout(checkAgain, 3000);
</script>

</body>
</html>
