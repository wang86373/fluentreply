<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>History - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --muted:#64748b;
  --border:#d1d5db;
  --blue:#1a73e8;
  --soft:#f1f5ff;
  --shadow:0 14px 40px rgba(15,23,42,.06);
}
body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --border:#334155;
  --blue:#60a5fa;
  --soft:#1e293b;
  --shadow:0 14px 40px rgba(0,0,0,.35);
}
body{
  margin:0;
  font-family:Arial,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  min-height:72px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 34px;
  gap:12px;
  flex-wrap:wrap;
}
.logo{
  font-size:24px;
  font-weight:900;
  color:var(--blue);
  cursor:pointer;
}
.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
button,select{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:10px 16px;
  font-weight:900;
  cursor:pointer;
}
.primary{
  background:var(--blue);
  color:white;
  border:none;
}
.app{
  max-width:1000px;
  margin:34px auto;
  padding:0 22px;
}
.hero{
  margin-bottom:24px;
}
h1{
  font-size:34px;
  margin:0 0 8px;
}
.sub{
  color:var(--muted);
  line-height:1.5;
  margin:0;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:22px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.meta{
  color:var(--muted);
  font-size:13px;
  margin-bottom:12px;
  line-height:1.5;
}
.label{
  font-size:13px;
  color:var(--blue);
  font-weight:900;
  margin:14px 0 6px;
}
.text{
  white-space:pre-wrap;
  line-height:1.55;
  font-size:15px;
}
.empty{
  text-align:center;
  color:var(--muted);
  background:var(--card);
  border:1px dashed var(--border);
  border-radius:22px;
  padding:46px 20px;
  margin-top:26px;
}
.search{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:16px;
  padding:14px 16px;
  font-size:15px;
  margin:18px 0;
}
.item-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}
.small{
  padding:8px 12px;
  font-size:13px;
}
.danger{
  color:#ef4444;
}
@media(max-width:700px){
  .header{padding:14px}
  .logo{font-size:20px}
  h1{font-size:28px}
}
</style>
</head>

<body>
<header class="header">
  <div class="logo" onclick="location.href='index.html'">FluentReply</div>

  <div class="actions">
    <select id="themeSelect" onchange="changeTheme()">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="auto">Auto</option>
    </select>
    <button onclick="location.href='index.html'">Back Home</button>
    <button class="primary" onclick="clearHistory()">Clear History</button>
  </div>
</header>

<main class="app">
  <section class="hero">
    <h1>Translation History</h1>
    <p class="sub">Your recent translation history is saved locally in this browser.</p>
  </section>

  <input id="searchInput" class="search" placeholder="Search history..." oninput="renderHistory()" />

  <div id="historyList"></div>
</main>

<script>
const SUPABASE_URL = "https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY = "sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

async function initAuth(){
  const { data } = await supabaseClient.auth.getUser();
  currentUser = data?.user || null;
}

function changeTheme(){
  localStorage.setItem("theme_mode",document.getElementById("themeSelect").value);
  applyTheme();
}

function applyTheme(){
  const theme=localStorage.getItem("theme_mode")||"light";
  document.getElementById("themeSelect").value=theme;

  const autoDark=window.matchMedia &&
    window.matchMedia("(prefers-color-scheme: dark)").matches;

  document.body.classList.toggle(
    "dark",
    theme==="dark" || (theme==="auto" && autoDark)
  );
}

async function getHistory(){

  if(currentUser?.email){

    const { data,error } =
      await supabaseClient
      .from("translation_history")
      .select("*")
      .eq("email", currentUser.email.toLowerCase())
      .order("created_at",{ ascending:false });

    if(!error && data){

      return data.map(item => ({
  id: item.id,
  sourceText: item.source_text,
  translatedText: item.translated_text,
  targetLang: item.target_lang,
  rewriteTone: item.rewrite_tone,
  createdAt: item.created_at
}));

    }

  }

  const localHistory = JSON.parse(
  localStorage.getItem("history_folded_tools") || "[]"
);

return localHistory.map((item,index)=>({

  id: item.id || index,

  sourceText:
    item.sourceText ||
    item.source ||
    "",

  translatedText:
    item.translatedText ||
    item.result ||
    "",

  targetLang:
    item.targetLang ||
    item.to ||
    "",

  rewriteTone:
    item.rewriteTone ||
    "",

  createdAt:
    item.createdAt ||
    item.time ||
    ""

}));

}

function saveHistory(list){
  localStorage.setItem("history_folded_tools",JSON.stringify(list));
}

async function renderHistory(){
  const list=document.getElementById("historyList");
  const query=document.getElementById("searchInput").value.trim().toLowerCase();

  const rawHistory = await getHistory();

let history = rawHistory.map((item,index)=>({
  ...item,
  originalIndex:index
}));

  if(query){
    history = history.filter(item => {

  return (
    String(item.sourceText || "").toLowerCase().includes(query) ||
    String(item.translatedText || "").toLowerCase().includes(query) ||
    String(item.targetLang || "").toLowerCase().includes(query) ||
    String(item.rewriteTone || "").toLowerCase().includes(query)
  );

});
  }

  if(!history.length){
    list.innerHTML='<div class="empty">No history found.</div>';
    return;
  }

  list.innerHTML="";

  history.forEach((item)=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="meta">
        ${escapeHTML(item.createdAt || "")} ·
        ${escapeHTML(item.targetLang || "")} ·
        ${escapeHTML(item.rewriteTone || "")}
      </div>

      <div class="label">Source</div>
     <div class="text">
  ${escapeHTML(item.sourceText || "")}
</div>

      <div class="label">Result</div>
      <div class="text">
  ${escapeHTML(item.translatedText || "")}
</div>

      <div class="item-actions">

  <button
    class="small"
    onclick='copyText(${JSON.stringify(item.translatedText || "")})'
  >
    Copy Result
  </button>

  <button
    class="small"
    onclick='copyText(${JSON.stringify(item.sourceText || "")})'
  >
    Copy Source
  </button>

  <button
    class="small danger"
    onclick='deleteItem("${item.id}")'
  >
    Delete
  </button>

</div>
    `;

    list.appendChild(card);
  });
}

function copyText(text){
  navigator.clipboard.writeText(text || "");
  alert("Copied");
}

async function deleteItem(id){

  if(!confirm("Delete this history item?")){
    return;
  }

  if(currentUser?.email){

    const { error } = await supabaseClient
      .from("translation_history")
      .delete()
      .eq("id", id);

    if(error){
      alert("Delete failed");
      return;
    }

  }else{

    let history = JSON.parse(
      localStorage.getItem("history_folded_tools") || "[]"
    );

    history = history.filter(
      item => String(item.id) !== String(id)
    );

    localStorage.setItem(
      "history_folded_tools",
      JSON.stringify(history)
    );
  }

  await renderHistory();

  alert("Deleted");
}

async function clearHistory(){

  if(!confirm("Clear all translation history?")){
    return;
  }

  if(currentUser?.email){

    const { error } = await supabaseClient
      .from("translation_history")
      .delete()
      .eq("email", currentUser.email.toLowerCase());

    if(error){
      alert("Clear failed");
      return;
    }

  }else{

    localStorage.removeItem("history_folded_tools");

  }

  await renderHistory();

  alert("History cleared");
}
  
function escapeHTML(str){
  return String(str).replace(/[&<>'"]/g,tag=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "'":"&#39;",
    '"':"&quot;"
  }[tag]||tag));
}

window.matchMedia &&
window.matchMedia("(prefers-color-scheme: dark)")
  .addEventListener?.("change",applyTheme);

applyTheme();

initAuth().then(()=>{
  renderHistory();
});
</script>
</body>
</html>
