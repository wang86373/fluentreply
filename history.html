<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f7fb;--card:#fff;--text:#111827;--muted:#64748b;--border:#d1d5db;
  --soft:#f1f5ff;--blue:#1a73e8;--dark:#0f2b46;--shadow:0 18px 50px rgba(15,23,42,.08);
}
body.dark{
  --bg:#0f172a;--card:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;
  --soft:#1e293b;--blue:#60a5fa;--dark:#2563eb;--shadow:0 18px 50px rgba(0,0,0,.35);
}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  min-height:72px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 34px;
  gap:12px;
  flex-wrap:wrap;
}
.logo{font-size:24px;font-weight:900;color:var(--blue)}
.header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
select{
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--card);
  color:var(--text);
  padding:10px 14px;
  font-size:14px;
}
.link-btn{
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:10px 18px;
  font-weight:900;
  cursor:pointer;
}
.app{
  min-height:calc(100vh - 72px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 18px;
}
.card{
  width:min(460px,100%);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:26px;
  padding:30px;
  box-shadow:var(--shadow);
}
h1{margin:0 0 8px;font-size:30px}
.sub{margin:0 0 22px;color:var(--muted);line-height:1.5}
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  background:var(--soft);
  border-radius:999px;
  padding:6px;
  margin-bottom:20px;
}
.tab{
  border:none;
  background:transparent;
  color:var(--muted);
  font-weight:900;
  border-radius:999px;
  padding:11px;
  cursor:pointer;
}
.tab.active{
  background:var(--card);
  color:var(--blue);
  box-shadow:0 4px 14px rgba(15,23,42,.08);
}
label{
  display:block;
  font-size:14px;
  font-weight:900;
  margin:14px 0 8px;
}
input{
  width:100%;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--card);
  color:var(--text);
  padding:13px 14px;
  font-size:15px;
  outline:none;
}
input:focus{border-color:var(--blue)}
.primary{
  width:100%;
  border:none;
  background:var(--blue);
  color:white;
  font-weight:900;
  border-radius:999px;
  padding:13px;
  margin-top:18px;
  cursor:pointer;
}
.secondary{
  width:100%;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--blue);
  font-weight:900;
  border-radius:999px;
  padding:13px;
  margin-top:10px;
  cursor:pointer;
}
.status{
  min-height:22px;
  margin-top:14px;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}
.links{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  gap:12px;
}
a{color:var(--blue);font-weight:900;text-decoration:none}
.hidden{display:none}
.error{color:#ef4444}
.success{color:#16a34a}
</style>
</head>

<body>
<header class="header">
  <div class="logo">FluentReply</div>
  <div class="header-actions">
    <select id="themeSelect" onchange="changeTheme()">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="auto">Auto</option>
    </select>

    <select id="uiLangSelect" onchange="changeUILanguage()">
      <option value="auto">Auto UI</option>
      <option value="English">English</option>
      <option value="Simplified Chinese">中文</option>
      <option value="Japanese">日本語</option>
      <option value="Korean">한국어</option>
      <option value="Spanish">Español</option>
      <option value="French">Français</option>
      <option value="German">Deutsch</option>
      <option value="Russian">Русский</option>
      <option value="Arabic">العربية</option>
      <option value="Portuguese">Português</option>
      <option value="Italian">Italiano</option>
    </select>

    <button class="link-btn" onclick="location.href='index.html'" data-i18n="home">Home</button>
  </div>
</header>

<main class="app">
  <section class="card">
    <h1 data-i18n="title">Login</h1>
    <p class="sub" data-i18n="subtitle">Choose password login or email verification code login.</p>

    <div class="tabs">
      <button id="passwordTab" class="tab active" onclick="setMode('password')" data-i18n="passwordTab">Password</button>
      <button id="codeTab" class="tab" onclick="setMode('code')" data-i18n="codeTab">Code</button>
    </div>

    <label data-i18n="emailLabel">Email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

    <div id="passwordBox">
      <label data-i18n="passwordLabel">Password</label>
      <input id="password" type="password" placeholder="Your password" autocomplete="current-password" />
      <button class="primary" onclick="loginWithPassword()" data-i18n="loginPassword">Login with password</button>
    </div>

    <div id="codeBox" class="hidden">
      <button class="primary" onclick="sendLoginCode()" data-i18n="sendCode">Send login code</button>

      <label data-i18n="codeLabel">Verification code</label>
      <input id="code" placeholder="Enter 6-digit code" inputmode="numeric" />

      <button class="primary" onclick="verifyLoginCode()" data-i18n="loginCode">Login with code</button>
    </div>

    <button class="secondary" onclick="location.href='index.html'" data-i18n="guest">Continue as guest</button>

    <div id="status" class="status"></div>

    <div class="links">
      <a href="signup.html" data-i18n="create">Create account</a>
      <a href="index.html" data-i18n="back">Back home</a>
    </div>
  </section>
</main>

function browserUILang(){
  const lang=navigator.language.toLowerCase();
  if(lang.startsWith("zh")) return "Simplified Chinese";
  if(lang.startsWith("ja")) return "Japanese";
  if(lang.startsWith("ko")) return "Korean";
  if(lang.startsWith("es")) return "Spanish";
  if(lang.startsWith("fr")) return "French";
  if(lang.startsWith("de")) return "German";
  if(lang.startsWith("ru")) return "Russian";
  if(lang.startsWith("ar")) return "Arabic";
  if(lang.startsWith("pt")) return "Portuguese";
  if(lang.startsWith("it")) return "Italian";
  return "English";
}

function getUILang(){
  const selected=document.getElementById("uiLangSelect").value;
  return selected==="auto"?browserUILang():selected;
}

function pack(){
  return i18n[getUILang()]||i18n.English;
}

function applyUILanguage(){
  const p=pack();
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key=el.getAttribute("data-i18n");
    if(p[key]) el.innerText=p[key];
  });
}

function changeUILanguage(){
  localStorage.setItem("ui_language",document.getElementById("uiLangSelect").value);
  applyUILanguage();
}

function changeTheme(){
  localStorage.setItem("theme_mode",document.getElementById("themeSelect").value);
  applyTheme();
}

function applyTheme(){
  const theme=localStorage.getItem("theme_mode")||"light";
  document.getElementById("themeSelect").value=theme;
  const autoDark=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.body.classList.toggle("dark",theme==="dark"||(theme==="auto"&&autoDark));
}

function setMode(mode){
  const passwordTab=document.getElementById("passwordTab");
  const codeTab=document.getElementById("codeTab");
  const passwordBox=document.getElementById("passwordBox");
  const codeBox=document.getElementById("codeBox");
  document.getElementById("status").innerText="";

  if(mode==="password"){
    passwordTab.classList.add("active");
    codeTab.classList.remove("active");
    passwordBox.classList.remove("hidden");
    codeBox.classList.add("hidden");
  }else{
    codeTab.classList.add("active");
    passwordTab.classList.remove("active");
    codeBox.classList.remove("hidden");
    passwordBox.classList.add("hidden");
  }
}

function setStatus(message,type=""){
  const box=document.getElementById("status");
  box.className="status "+type;
  box.innerText=message;
}

async function loginWithPassword(){
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const p=pack();

  if(!email){setStatus(p.needEmail,"error");return}
  if(!password){setStatus(p.needPassword,"error");return}

  setStatus(p.logging);

  const {error}=await supabaseClient.auth.signInWithPassword({email,password});

  if(error){setStatus(error.message,"error");return}

  setStatus(p.success,"success");
  setTimeout(()=>location.href="index.html",700);
}

async function sendLoginCode(){
  const email=document.getElementById("email").value.trim();
  const p=pack();

  if(!email){setStatus(p.needEmail,"error");return}

  setStatus(p.sending);

  const {error}=await supabaseClient.auth.signInWithOtp({
    email,
    options:{shouldCreateUser:false}
  });

  if(error){setStatus(error.message,"error");return}

  setStatus(p.sent,"success");
}

async function verifyLoginCode(){
  const email=document.getElementById("email").value.trim();
  const code=document.getElementById("code").value.trim();
  const p=pack();

  if(!email||!code){setStatus(p.needCode,"error");return}

  setStatus(p.verifying);

  const {error}=await supabaseClient.auth.verifyOtp({
    email,
    token:code,
    type:"email"
  });

  if(error){setStatus(error.message,"error");return}

  setStatus(p.success,"success");
  setTimeout(()=>location.href="index.html",700);
}

function init(){
  const savedUI=localStorage.getItem("ui_language");
  if(savedUI) document.getElementById("uiLangSelect").value=savedUI;
  applyTheme();
  applyUILanguage();
}

window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change",applyTheme);
init();
