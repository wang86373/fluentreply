<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sign up - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fb;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  width:100%;
  max-width:560px;
  background:white;
  border-radius:24px;
  padding:38px;
  box-shadow:0 20px 60px rgba(15,23,42,.10);
}
h1{margin:0 0 12px;font-size:34px}
.sub{margin:0 0 26px;color:#333;font-size:18px}
input{
  width:100%;
  padding:15px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #d1d5db;
  font-size:16px;
}
button{
  width:100%;
  padding:15px;
  margin-top:18px;
  border:none;
  border-radius:999px;
  background:#1a73e8;
  color:white;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
}
button:disabled{
  opacity:.65;
  cursor:not-allowed;
}
.secondary{
  background:white;
  color:#111827;
  border:1px solid #d1d5db;
}
.status{
  min-height:24px;
  margin-top:18px;
  font-size:15px;
}
.error{color:#ef4444}
.success{color:#16a34a}
</style>
</head>

<body>

<div class="card">
  <h1>Create account</h1>
  <p class="sub">Sign up with email</p>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password (min 6 chars)" />

  <button id="signupBtn" type="button">Sign up</button>

  <button class="secondary" onclick="location.href='login.html'">
    Already have account
  </button>

  <div id="status" class="status">Loading...</div>
</div>

<script>
const SUPABASE_URL = "https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY = "sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";

let supabaseClient = null;

function setStatus(text,type=""){
  const el=document.getElementById("status");
  el.className="status "+type;
  el.innerText=text;
}

function setLoading(loading){
  const btn=document.getElementById("signupBtn");
  btn.disabled=loading;
  btn.innerText = loading ? "Creating..." : "Sign up";
}

async function signup(){
  if(!supabaseClient){
    setStatus("Supabase not loaded","error");
    return;
  }

  const email=document.getElementById("email").value.trim().toLowerCase();
  const password=document.getElementById("password").value;

  if(!email){
    setStatus("Enter email","error");
    return;
  }

  if(!password){
    setStatus("Enter password","error");
    return;
  }

  if(password.length < 6){
    setStatus("Password too short","error");
    return;
  }

  setLoading(true);
  setStatus("Creating account...");

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  setLoading(false);

  if(error){
    setStatus(error.message,"error");
    return;
  }

  setStatus("Success! Redirecting...","success");

  setTimeout(()=>{
    location.href="login.html";
  },1000);
}

function init(){
  const btn=document.getElementById("signupBtn");

  // 绑定按钮（关键）
  btn.addEventListener("click", signup);

  // Enter 提交
  document.getElementById("password").addEventListener("keydown",(e)=>{
    if(e.key==="Enter") signup();
  });

  // 检查 Supabase 是否加载
  if(!window.supabase){
    setStatus("Supabase CDN blocked","error");
    return;
  }

  supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

  setStatus("Ready.");
}

// 确保 DOM 加载后执行
document.addEventListener("DOMContentLoaded", init);
</script>

</body>
</html>
