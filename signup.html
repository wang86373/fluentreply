<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sign up - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#eef4ff,#fff);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:min(440px,92vw);background:white;border:1px solid #e5e7eb;border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(15,23,42,.12)}
.logo{font-size:26px;font-weight:900;color:#1a73e8;margin-bottom:8px}
h1{margin:0 0 8px}
p{color:#64748b;line-height:1.5}
label{font-weight:700;font-size:14px;margin:14px 0 8px;display:block}
input{width:100%;border:1px solid #dadce0;border-radius:12px;padding:13px;font-size:15px}
button{width:100%;border:none;background:#0f2b46;color:white;font-weight:800;border-radius:999px;padding:13px;margin-top:18px;cursor:pointer}
.secondary{background:white;color:#1a73e8;border:1px solid #dadce0}
.status{margin-top:14px;color:#64748b;font-size:14px;min-height:20px}
.links{margin-top:20px;display:flex;justify-content:space-between}
a{color:#1a73e8;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <div class="logo">FluentReply</div>
  <h1>Create account</h1>
  <p>Set your password, then enter the verification code from your email.</p>

  <label>Email</label>
  <input id="email" type="email" placeholder="you@example.com">

  <label>Password</label>
  <input id="password" type="password" placeholder="At least 6 characters">

  <label>Confirm password</label>
  <input id="confirmPassword" type="password" placeholder="Enter password again">

  <button onclick="sendSignupCode()">Send verification code</button>

  <label>Verification code</label>
  <input id="code" placeholder="Enter 6-digit code">

  <button onclick="verifySignupCode()">Verify and sign in</button>
  <button class="secondary" onclick="location.href='index.html'">Continue as guest</button>

  <div id="status" class="status"></div>

  <div class="links">
    <a href="login.html">Login</a>
    <a href="index.html">Back home</a>
  </div>
</div>

<script>
const SUPABASE_URL = "https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY = "sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getValues() {
  return {
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value,
    confirmPassword: document.getElementById("confirmPassword").value,
    code: document.getElementById("code").value.trim(),
    status: document.getElementById("status")
  };
}

async function sendSignupCode() {
  const { email, password, confirmPassword, status } = getValues();

  if (!email || !password || !confirmPassword) {
    status.innerText = "Please enter email and password.";
    return;
  }

  if (password.length < 6) {
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  if (password !== confirmPassword) {
    status.innerText = "Passwords do not match.";
    return;
  }

  status.innerText = "Sending verification code...";

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    status.innerText = error.message;
    return;
  }

  status.innerText = "Verification code sent. Please check your email.";
}

async function verifySignupCode() {
  const { email, password, code, status } = getValues();

  if (!email || !password || !code) {
    status.innerText = "Please enter email, password, and verification code.";
    return;
  }

  status.innerText = "Verifying...";

  const { error: verifyError } = await supabaseClient.auth.verifyOtp({
    email,
    token: code,
    type: "signup"
  });

  if (verifyError) {
    status.innerText = verifyError.message;
    return;
  }

  const { error: loginError } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (loginError) {
    status.innerText = "Verified. Please go to login page.";
    return;
  }

  status.innerText = "Success. Redirecting...";
  setTimeout(() => location.href = "index.html", 700);
}
</script>
</body>
</html>
