<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sign up - FluentReply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f7fb;
  --card:#fff;
  --text:#111827;
  --muted:#64748b;
  --border:#d1d5db;
  --blue:#1a73e8;
}
body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --border:#334155;
}
body{
  margin:0;
  font-family:Arial,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
.card{
  width:100%;
  max-width:560px;
  margin:80px auto;
  background:var(--card);
  border-radius:24px;
  padding:36px;
  border:1px solid var(--border);
}
h1{margin:0 0 10px;font-size:34px}
.sub{color:var(--muted);margin-bottom:20px}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  background:#eef3ff;
  border-radius:999px;
  padding:6px;
}
.tab{
  border:none;
  background:transparent;
  padding:10px;
  border-radius:999px;
  cursor:pointer;
  font-weight:900;
}
.tab.active{
  background:var(--card);
  color:var(--blue);
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid var(--border);
  font-size:15px;
}

button{
  width:100%;
  padding:14px;
  margin-top:16px;
  border:none;
  border-radius:999px;
  background:var(--blue);
  color:white;
  font-weight:900;
  cursor:pointer;
}
.secondary{
  background:white;
  color:var(--text);
  border:1px solid var(--border);
}

.status{
  margin-top:16px;
  font-size:14px;
}
.error{color:#ef4444}
.success{color:#16a34a}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
  <h1>Create account</h1>
  <p class="sub">Email signup with verification</p>

  <div class="tabs">
    <button id="passwordTab" class="tab active" onclick="setMode('password')">Password</button>
    <button id="codeTab" class="tab" onclick="setMode('code')">Code</button>
  </div>

  <input id="email" placeholder="Email" />

  <div id="passwordBox">
    <input id="password" type="password" placeholder="Password (min 6 chars)" />
    <button id="passwordSignupBtn" onclick="signupWithPassword()">Sign up</button>
  </div>

  <div id="codeBox" class="hidden">
    <button id="sendCodeBtn" onclick="sendSignupCode()">Send code</button>
    <input id="code" placeholder="Enter verification code" />
    <button onclick="verifySignupCode()">Verify & Sign up</button>
  </div>

  <button class="secondary" onclick="location.href='login.html'">
    Already have account
  </button>

  <div id="status" class="status">Ready.</div>
</div>

<script>
const SUPABASE_URL="https://smwclefrunxnzzjammnu.supabase.co";
const SUPABASE_KEY="sb_publishable_DWI3c__Tq7P9z7GSJqhT6g_dzKxwMrb";

let supabaseClient=null;

function setMode(mode){
  document.getElementById("passwordTab").classList.toggle("active",mode==="password");
  document.getElementById("codeTab").classList.toggle("active",mode==="code");

  document.getElementById("passwordBox").classList.toggle("hidden",mode!=="password");
  document.getElementById("codeBox").classList.toggle("hidden",mode!=="code");
}

function setStatus(text,type=""){
  const el=document.getElementById("status");
  el.className="status "+type;
  el.innerText=text;
}

function setLoading(id,loading){
  const btn=document.getElementById(id);
  btn.disabled=loading;
}

/* 🔥 已修复核心逻辑 */
async function signupWithPassword(){

  const email=document.getElementById("email").value.trim().toLowerCase();
  const password=document.getElementById("password").value;

  if(!email){
    setStatus("Enter email","error");
    return;
  }

  if(!password || password.length<6){
    setStatus("Password too short","error");
    return;
  }

  if(!supabaseClient){
    setStatus("Signup system failed to load. Please refresh.","error");
    return;
  }

  setLoading("passwordSignupBtn",true);
  setStatus("Creating account...");

  try{

    const {error}=await supabaseClient.auth.signUp({
      email,
      password,
      options:{
        emailRedirectTo:
          location.origin + "/index.html"
      }
    });

    if(error){
      setStatus(error.message,"error");
      return;
    }

    setMode("code");
    setStatus(
      "Code sent. Check email.",
      "success"
    );

  }catch(e){

    console.error(
      "Signup password error:",
      e
    );

    setStatus(
      "Signup failed. Please try again.",
      "error"
    );

  }finally{

    setLoading(
      "passwordSignupBtn",
      false
    );

  }
}

async function sendSignupCode(){

  const email=document.getElementById("email")
    .value.trim().toLowerCase();

  if(!email){
    setStatus("Enter email","error");
    return;
  }

  if(!supabaseClient){
    setStatus(
      "Signup system failed to load. Please refresh.",
      "error"
    );
    return;
  }

  setStatus("Sending code...");
  setLoading("sendCodeBtn",true);

  try{

    const {error} =
      await supabaseClient.auth.signInWithOtp({
        email,
        options:{
          shouldCreateUser:true
        }
      });

    if(error){
      setStatus(error.message,"error");
      return;
    }

    setStatus("Code sent","success");

  }catch(e){

    console.error(
      "Send signup code error:",
      e
    );

    setStatus(
      "Send code failed. Please try again.",
      "error"
    );

  }finally{

    setLoading(
      "sendCodeBtn",
      false
    );

  }
}

async function verifySignupCode(){
  const email=document.getElementById("email").value.trim().toLowerCase();
  const code=document.getElementById("code").value.trim();

  if(!code){
    setStatus("Enter code","error");return;
  }

  setStatus("Verifying...");

  const {error}=await supabaseClient.auth.verifyOtp({
    email,
    token:code,
    type:"email"
  });

  if(error){
    setStatus(error.message,"error");return;
  }

  setStatus("Success! Redirecting...","success");

  setTimeout(()=>{
    location.href="index.html";
  },800);
}

function init(){
  supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );
}

document.addEventListener("DOMContentLoaded",init);
</script>

</body>
</html>
